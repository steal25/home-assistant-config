esphome:
  name: esphome-web-aef888
  friendly_name: Rize Bed Controller
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


switch:
  - platform: gpio
    pin: GPIO2
    name: "Test Head Up"

  - platform: gpio
    pin: GPIO3
    name: "Test Head Down"

  - platform: gpio
    pin: GPIO4
    name: "Test Leg Up"

  - platform: gpio
    pin: GPIO7
    name: "Test Leg Down"  
