esphome:
  name: wt32-living-room-panel
  friendly_name: WT32 Living Room Panel
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: quad
  speed: 80MHz

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "WT32-Fallback"
    password: "12345678"

captive_portal:

spi:
  - id: octal_spi
    type: octal
    clk_pin: GPIO47
    data_pins:
      - GPIO9
      - number: GPIO46
        ignore_strapping_warning: true
      - number: GPIO3
        ignore_strapping_warning: true
      - GPIO8
      - GPIO18
      - GPIO17
      - GPIO16
      - GPIO15

i2c:
  sda: GPIO6
  scl: GPIO5
  frequency: 400kHz

output:
  - platform: ledc
    id: backlight_pwm
    pin:
      number: GPIO45
      ignore_strapping_warning: true

light:
  - platform: monochromatic
    id: backlight
    name: "WT32 Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 22

  - file: "gfonts://Roboto"
    id: font_pct
    size: 34

  - file: "gfonts://Roboto"
    id: font_button
    size: 16

globals:
  - id: lr_dragging
    type: bool
    initial_value: 'false'

  - id: lr_pending_brightness
    type: int
    initial_value: '0'

display:
  - platform: mipi_spi
    id: main_display
    model: WT32-SC01-PLUS
    spi_id: octal_spi
    bus_mode: octal
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  - platform: ft63x6
    id: main_touchscreen
    interrupt_pin: GPIO7

script:
  - id: lr_send_brightness
    mode: restart
    then:
      - delay: 60ms
      - if:
          condition:
            lambda: 'return id(lr_pending_brightness) <= 2;'
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: light.living_room_hue_lights_group
            - lvgl.slider.update:
                id: slider_lr
                value: 0
            - lvgl.label.update:
                id: lbl_pct_lr
                text: "0%"
          else:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: light.living_room_hue_lights_group
                  brightness: !lambda return id(lr_pending_brightness);

sensor:
  - platform: homeassistant
    id: lr_brightness
    entity_id: light.living_room_hue_lights_group
    attribute: brightness
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(lr_dragging);'
            then:
              - lvgl.slider.update:
                  id: slider_lr
                  value: !lambda return int(x);
              - lvgl.label.update:
                  id: lbl_pct_lr
                  text: !lambda |-
                    char buf[10];
                    int pct = int((x / 255.0f) * 100.0f);
                    snprintf(buf, sizeof(buf), "%d%%", pct);
                    return std::string(buf);

binary_sensor:
  - platform: homeassistant
    id: lr_is_on
    entity_id: light.living_room_hue_lights_group
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return !x && !id(lr_dragging);'
            then:
              - lvgl.slider.update:
                  id: slider_lr
                  value: 0
              - lvgl.label.update:
                  id: lbl_pct_lr
                  text: "0%"

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen

  theme:
    label:
      text_color: 0xFFFFFF

    button:
      bg_color: 0x3D3D3D
      bg_opa: COVER
      radius: 22
      border_width: 0
      text_color: 0xF2F2F2
      pressed:
        bg_color: 0x6A6A6A

    slider:
      bg_color: 0x3A3A3A
      bg_opa: COVER
      radius: 30
      indicator:
        bg_color: 0xD9D77A
        bg_opa: COVER
      knob:
        bg_opa: TRANSP
        border_opa: TRANSP
        outline_opa: TRANSP
        shadow_opa: TRANSP
        radius: 0

  pages:
    - id: page_main
      bg_color: 0x2F3136
      widgets:
        - label:
            id: lbl_title
            x: 0
            y: 18
            width: 320
            text_align: center
            text_font: font_title
            text: "Living Room Lights"

        - label:
            id: lbl_pct_lr
            x: 0
            y: 60
            width: 320
            text_align: center
            text_font: font_pct
            text: "0%"

        - slider:
            id: slider_lr
            x: 105
            y: 130
            width: 110
            height: 210
            min_value: 0
            max_value: 255
            value: 0
            mode: NORMAL
            on_press:
              - lambda: |-
                  id(lr_dragging) = true;
            on_value:
              - lambda: |-
                  id(lr_pending_brightness) = int(x);
              - lvgl.label.update:
                  id: lbl_pct_lr
                  text: !lambda |-
                    char buf[10];
                    int pct = int((x / 255.0f) * 100.0f);
                    snprintf(buf, sizeof(buf), "%d%%", pct);
                    return std::string(buf);
              - script.execute: lr_send_brightness
            on_release:
              - lambda: |-
                  id(lr_dragging) = false;
              - script.execute: lr_send_brightness

        - button:
            x: 18
            y: 400
            width: 68
            height: 42
            on_click:
              - homeassistant.action:
                  action: light.turn_on
                  data:
                    entity_id: light.living_room_hue_lights_group
                    color_temp_kelvin: "2700"
            widgets:
              - label:
                  align: center
                  text_font: font_button
                  text: "Warm"

        - button:
            x: 92
            y: 400
            width: 78
            height: 42
            on_click:
              - homeassistant.action:
                  action: light.turn_on
                  data:
                    entity_id: light.living_room_hue_lights_group
                    color_temp_kelvin: "4000"
            widgets:
              - label:
                  align: center
                  text_font: font_button
                  text: "Neutral"

        - button:
            x: 176
            y: 400
            width: 64
            height: 42
            on_click:
              - homeassistant.action:
                  action: light.turn_on
                  data:
                    entity_id: light.living_room_hue_lights_group
                    color_temp_kelvin: "6500"
            widgets:
              - label:
                  align: center
                  text_font: font_button
                  text: "Cool"

        - button:
            x: 246
            y: 400
            width: 56
            height: 42
            on_click:
              - homeassistant.action:
                  action: light.turn_on
                  data:
                    entity_id: light.living_room_hue_lights_group
                    brightness: "255"
            widgets:
              - label:
                  align: center
                  text_font: font_button
                  text: "Max"