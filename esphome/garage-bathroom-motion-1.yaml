# ------------------------ Diagnostics ---------------------------
sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s
    id: wifi_rssi

  - platform: uptime
    name: "Uptime"
    id: dev_uptime

  - platform: ld2410
    moving_distance:
      name: "Moving Distance (cm)"
      id: ld_move_dist
    still_distance:
      name: "Still Distance (cm)"
      id: ld_still_dist
    moving_energy:
      name: "Move Energy (%)"
      id: ld_move_energy
    still_energy:
      name: "Still Energy (%)"
      id: ld_still_energy
    detection_distance:
      name: "Distance Detection (cm)"
      id: ld_detect_dist
    g0:
      move_energy:  { name: "g0 move energy",  id: g0_me }
      still_energy: { name: "g0 still energy", id: g0_se }
    g1:
      move_energy:  { name: "g1 move energy",  id: g1_me }
      still_energy: { name: "g1 still energy", id: g1_se }
    g2:
      move_energy:  { name: "g2 move energy",  id: g2_me }
      still_energy: { name: "g2 still energy", id: g2_se }
    g3:
      move_energy:  { name: "g3 move energy",  id: g3_me }
      still_energy: { name: "g3 still energy", id: g3_se }
    g4:
      move_energy:  { name: "g4 move energy",  id: g4_me }
      still_energy: { name: "g4 still energy", id: g4_se }
    g5:
      move_energy:  { name: "g5 move energy",  id: g5_me }
      still_energy: { name: "g5 still energy", id: g5_se }
    g6:
      move_energy:  { name: "g6 move energy",  id: g6_me }
      still_energy: { name: "g6 still energy", id: g6_se }
    g7:
      move_energy:  { name: "g7 move energy",  id: g7_me }
      still_energy: { name: "g7 still energy", id: g7_se }
    g8:
      move_energy:  { name: "g8 move energy",  id: g8_me }
      still_energy: { name: "g8 still energy", id: g8_se }
    light:
      name: "light"
      id: ld_light

# ------------------------ Presence (raw) ------------------------
binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence"
      id: ld_has_target
  - platform: ld2410
    has_moving_target:
      name: "Moving Target"
      id: ld_moving
  - platform: ld2410
    has_still_target:
      name: "Still Target"
      id: ld_still
  - platform: ld2410
    out_pin_presence_status:
      name: "OUT Pin Presence"
      id: ld_out_pin

  # ---------- Smart Presence (debounced & distance-limited) ----------
  - platform: template
    name: "Smart Presence"
    id: smart_presence
    device_class: presence
    lambda: |-
      // Base presence is has_target
      bool present = id(ld_has_target).state;

      // Optional distance gate: ignore if detection is farther than configured
      const float max_cm = atof("${smart_max_distance_cm}");
      if (max_cm > 0.0f) {
        float d = isnan(id(ld_detect_dist).state) ? 0.0f : id(ld_detect_dist).state;
        if (d <= 0.0f || d > max_cm) {
          present = false;
        }
      }

      return present;
    filters:
      - delayed_on:  ${smart_on_ms}   # Debounce
      - delayed_off: ${smart_off_s}   # Hold

# ------------------------ (Optional) Presets ------------------------
# Example “small bathroom” preset you can call from HA (scene/script).
# It narrows max distance gates and raises far-gate thresholds to fight false positives.
script:
  - id: preset_small_bathroom
    mode: queued
    then:
      - logger.log: "Applying 'small bathroom' LD2410 preset"
      - number.set:
          id: ld_max_move_gate
          value: 5          # gates 0..5 active for moving
      - number.set:
          id: ld_max_still_gate
          value: 4          # gates 0..4 active for still
      # Example: far gates less sensitive (raise thresholds)
      - number.set: { id: g6_m, value: 80 }
      - number.set: { id: g7_m, value: 90 }
      - number.set: { id: g8_m, value: 95 }
      - number.set: { id: g6_s, value: 85 }
      - number.set: { id: g7_s, value: 90 }
      - number.set: { id: g8_s, value: 95 }
      - button.press: ld_query

    

      
    