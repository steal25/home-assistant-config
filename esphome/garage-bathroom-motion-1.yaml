    g3:
      move_threshold: { name: "g3 move threshold",  id: g3_m }
      still_threshold:{ name: "g3 still threshold", id: g3_s }
    g4:
      move_threshold: { name: "g4 move threshold",  id: g4_m }
      still_threshold:{ name: "g4 still threshold", id: g4_s }
    g5:
      move_threshold: { name: "g5 move threshold",  id: g5_m }
      still_threshold:{ name: "g5 still threshold", id: g5_s }
    g6:
      move_threshold: { name: "g6 move threshold",  id: g6_m }
      still_threshold:{ name: "g6 still threshold", id: g6_s }
    g7:
