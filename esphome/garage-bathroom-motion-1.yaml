substitutions:
  smart_on_ms: "200ms"        # Debounce for Smart Presence (turn-on delay)
  smart_off_s: "8s"           # Hold time after last detection (turn-off delay)
  smart_max_distance_cm: "0"  # 0 = disabled; else ignore detections farther than this

esphome:
  name: garage-bathroom-motion-2
  friendly_name: Garage Bathroom Motion 2
  # Uncomment to auto-refresh/query params on boot (useful when tuning)
  # on_boot:
  #   priority: 600
  #   then:
  #     - logger.log: "LD2410: querying params on boot"
  #     - button.press: ld_query
  #     # You can briefly enable eng mode to view per-gate energies at boot:
  #     # - switch.turn_on: ld_eng
  #     # - delay: 20s
  #     # - switch.turn_off: ld_eng

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Logging
logger:

# API / OTA
api:
  encryption:
    key: "aMfh4FPJA0KjwfjnkxIwyXp0yKdxy3HnYy+XhUcBc5I="

ota:
  - platform: esphome
    password: "b61d6579d30fca99fe46cd6eabd5fc6f"

# Wi-Fi (leave your secrets as-is)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # fast_connect: true          # Uncomment if your SSID is hidden or connection is flaky on C3
  # power_save_mode: LIGHT      # Optional; reduces chatter

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Garage-Bathroom-Motion-1"
    password: "EWia2OgfnXtQ"
	
captive_portal:

# Simple local web status page
web_server:
  port: 80
  include_internal: true

# ------------------------ UI / Status LED ------------------------
# Blue status LED (OFF during normal operation; flashes on errors)
light:
  - platform: binary
    name: "Blue Status Light"
    output: light_output
    id: led_light
    restore_mode: ALWAYS_OFF

output:
  - platform: gpio
    pin: GPIO2
    id: light_output

status_led:
  pin:
    number: GPIO2
    inverted: false
  # The 'status_led' uses the same pin as your Blue LED, but only blinks on errors/boot.

# ------------------------ UART / LD2410 --------------------------
uart:
  id: ld2410_uart
  tx_pin: GPIO10         # ESP TX -> LD2410 RX
  rx_pin: GPIO9          # ESP RX -> LD2410 TX
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_comp
  uart_id: ld2410_uart
  # throttle: 1500ms     # Optional: reduce update rate if you want fewer sensor updates

# ------------------------ Controls / Tuning ----------------------
select:
  - platform: ld2410
    distance_resolution:
      name: "distance resolution"
      id: ld_dist_res
    baud_rate:
      name: "baud rate"
      id: ld_baud
    light_function:
      name: "light function"
      id: ld_light_fn
    out_pin_level:
      name: "out pin level"
      id: ld_out_level

button:
  - platform: ld2410
    factory_reset:
      name: "factory reset"
      id: ld_factory
  - platform: ld2410
    restart:
      name: "restart"
      id: ld_restart
  - platform: ld2410
    query_params:
      name: "query params"
      id: ld_query

switch:
  - platform: ld2410
    engineering_mode:
      name: "engineering mode"
      id: ld_eng
    bluetooth:
      name: "control Bluetooth"
      id: ld_bt

number:
  - platform: ld2410
    timeout:
      name: "timeout"
      id: ld_timeout
    max_move_distance_gate:
      name: "max move distance gate"
      id: ld_max_move_gate
    max_still_distance_gate:
      name: "max still distance gate"
      id: ld_max_still_gate
    g0:
