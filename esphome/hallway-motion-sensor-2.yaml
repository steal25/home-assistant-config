esphome:
  name: "hallway-motion-sensor-2"
  friendly_name: Hallway Motion Sensor 2

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "cVZ4C20CzCMJpOWjdvm7tDSNQHOQ6eACmFXfiWjo6UU="

ota:
  - platform: esphome
    password: "8744d5cf3e10a57750bc52044a441e1f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  # Optional manual IP
  manual_ip:
    static_ip: 172.25.14.48
    gateway: 172.25.14.1
    subnet: 255.255.255.0  

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Motion-Sensor-Extra-1"
    password: "lb6xGLomhPa1"

captive_portal:

web_server:
  port: 80
  include_internal: true

# ── Bluetooth Proxy (IRK-friendly) ────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 600ms
    window: 600ms

bluetooth_proxy:
  active: true

# ── Status LED (optional) ─────────────────────────────────────────────────────
status_led:
  pin:
    number: GPIO2
    inverted: false

# ── LD2410 wiring (UART) ──────────────────────────────────────────────────────
uart:
  id: ld2410_uart
  tx_pin: GPIO10
  rx_pin: GPIO9
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_comp
  uart_id: ld2410_uart
  # NOTE: 'throttle' removed per ESPHome change. Use per-sensor filters below.

# ── I²C bus for SCD41 + SGP41 ─────────────────────────────────────────────────
i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  frequency: 400kHz

# ── UI controls (kept identical across nodes) ─────────────────────────────────
number:
  - platform: ld2410
    timeout:
      name: "LD2410 Timeout (s)"
      id: ld_timeout
    max_move_distance_gate:
      name: "LD2410 Max Move Gate"
      id: ld_max_move_gate
    max_still_distance_gate:
      name: "LD2410 Max Still Gate"
      id: ld_max_still_gate
    light_threshold:
      name: "LD2410 Light Threshold"
      id: ld_light_thr

  # Smart Presence distance limit (0 = disabled)
  - platform: template
    name: "Smart Presence Max Distance (cm)"
    id: smart_max_distance_cm
    optimistic: true
    min_value: 0
    max_value: 600
    step: 10
    restore_value: true
    initial_value: 0

switch:
  - platform: ld2410
    engineering_mode:
      name: "LD2410 Engineering Mode"
      id: ld_eng
    bluetooth:
      name: "LD2410 Control Bluetooth"
      id: ld_bt

button:
  - platform: ld2410
    query_params:
      name: "LD2410 Query Params"
      id: ld_query
  - platform: ld2410
    restart:
      name: "LD2410 Restart"
      id: ld_restart
  - platform: ld2410
    factory_reset:
      name: "LD2410 Factory Reset"
      id: ld_factory

select:
  - platform: ld2410
    distance_resolution:
      name: "LD2410 Distance Resolution"
      id: ld_dist_res
    baud_rate:
      name: "LD2410 Baud Rate"
      id: ld_baud
    light_function:
      name: "LD2410 Light Function"
      id: ld_light_fn
    out_pin_level:
      name: "LD2410 OUT Pin Level"
      id: ld_out_level

# ── Text sensors (informational) ──────────────────────────────────────────────
text_sensor:
  - platform: ld2410
    version:
      name: "Presence Sensor Version"
    mac_address:
      name: "Presence Sensor MAC"

# ── Presence sensors (single block) ───────────────────────────────────────────
binary_sensor:
  # Raw LD2410
  - platform: ld2410
    has_target:
      name: "Presence"
      id: ld_has_target
  - platform: ld2410
    has_moving_target:
      name: "Moving Target"
      id: ld_moving
  - platform: ld2410
    has_still_target:
      name: "Still Target"
      id: ld_still
  - platform: ld2410
    out_pin_presence_status:
      name: "OUT Pin Presence"
      id: ld_out_pin

  # Smart Presence (debounced + optional distance limit)
  - platform: template
    name: "Smart Presence"
    id: smart_presence
    device_class: presence
    lambda: |-
      bool present = id(ld_has_target).state;
      float max_cm = id(smart_max_distance_cm).state;  // 0 = disabled
      if (max_cm > 0.0f) {
        float d = isnan(id(ld_detect_dist).state) ? 0.0f : id(ld_detect_dist).state;
        if (d <= 0.0f || d > max_cm) present = false;
      }
      return present;
    filters:
      - delayed_on: 200ms
      - delayed_off: 8s

# ── Diagnostics + Air Quality ────────────────────────────────────────────────
sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s
    id: wifi_rssi

  - platform: uptime
    name: "Uptime"
    id: dev_uptime

  - platform: ld2410
    moving_distance:
      name: "Moving Distance (cm)"
      id: ld_move_dist
      filters:
        - throttle: 1.5s
    still_distance:
      name: "Still Distance (cm)"
      id: ld_still_dist
      filters:
        - throttle: 1.5s
    detection_distance:
      name: "Distance Detection (cm)"
      id: ld_detect_dist
      filters:
        - throttle: 1.5s
    moving_energy:
      name: "Move Energy (%)"
      id: ld_move_energy
      filters:
        - throttle: 1.5s
    still_energy:
      name: "Still Energy (%)"
      id: ld_still_energy
      filters:
        - throttle: 1.5s
    light:
      name: "Light"
      id: ld_light
      filters:
        - throttle: 1.5s

  # SCD41 - CO2 + temp + humidity
  - platform: scd4x
    co2:
      name: "Hallway 2 CO2"
      id: hallway2_co2
    temperature:
      name: "Hallway 2 CO2 Temperature"
      id: hallway2_temp
    humidity:
      name: "Hallway 2 CO2 Humidity"
      id: hallway2_humidity
    update_interval: 60s

  # SGP41 (via sgp4x) - VOC / NOx index with compensation
  - platform: sgp4x
    voc:
      name: "Hallway 2 VOC Index"
      id: hallway2_voc_index
    nox:
      name: "Hallway 2 NOx Index"
      id: hallway2_nox_index
    compensation:
      temperature_source: hallway2_temp
      humidity_source: hallway2_humidity
    update_interval: 60s

# ── Optional preset ───────────────────────────────────────────────────────────
script:
  - id: preset_small_bathroom
    mode: queued
    then:
      - logger.log: "Applying 'Small Bathroom' LD2410 preset"
      - number.set: { id: ld_max_move_gate,  value: 5 }
      - number.set: { id: ld_max_still_gate, value: 4 }
      - button.press: ld_query
