substitutions:
  name: everything-presence-one-8f267c
  friendly_name: Everything Presence One
packages:
  Everything Smart Technology.Everything Presence One: github://everythingsmarthome/everything-presence-one/everything-presence-one-sen0609-ble-rev1.6.yaml@main
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
api:
  encryption:
    key: I29gpOUNhnGp7XSnS8D1Uv/m6zu+eF6ZR+GACJ8lzl8=


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  manual_ip:
    # Set this to the IP of the ESP
    static_ip: 172.25.14.82
    # Set this to the IP address of the router. Often ends with .1
    gateway: 172.25.14.1
    # The subnet of the network. 255.255.255.0 works for most home networks.
    subnet: 255.255.255.0



esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 800ms
    window: 800ms    