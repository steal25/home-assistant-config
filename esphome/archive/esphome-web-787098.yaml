  - platform: template
    name: "Z5 Capture Unoccupied"
    on_press:
      - lambda: "id(z5_unocc)=id(z5_raw).state;"
  - platform: template
    name: "Z5 Capture Occupied"
    on_press:
      - lambda: "id(z5_occ)=id(z5_raw).state;"

  - platform: template
    name: "Z6 Capture Unoccupied"
    on_press:
      - lambda: "id(z6_unocc)=id(z6_raw).state;"
  - platform: template
    name: "Z6 Capture Occupied"
    on_press:
      - lambda: "id(z6_occ)=id(z6_raw).state;"

# -------------------- Occupancy Sensors --------------------
binary_sensor:
  - platform: template
    name: "Couch Zone 1"
    device_class: occupancy
    lambda: |-
      return id(z1_pressure).state > id(z1_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Zone 2"
    device_class: occupancy
    lambda: |-
      return id(z2_pressure).state > id(z2_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Zone 3"
    device_class: occupancy
    lambda: |-
      return id(z3_pressure).state > id(z3_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Zone 4"
    device_class: occupancy
    lambda: |-
      return id(z4_pressure).state > id(z4_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Zone 5"
    device_class: occupancy
    lambda: |-
      return id(z5_pressure).state > id(z5_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Zone 6"
    device_class: occupancy
    lambda: |-
      return id(z6_pressure).state > id(z6_trigger).state;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Either Occupied"
    device_class: occupancy
    lambda: |-
      return (
        (id(z1_pressure).state > id(z1_trigger).state) ||
        (id(z2_pressure).state > id(z2_trigger).state) ||
        (id(z3_pressure).state > id(z3_trigger).state) ||
        (id(z4_pressure).state > id(z4_trigger).state) ||
        (id(z5_pressure).state > id(z5_trigger).state) ||
        (id(z6_pressure).state > id(z6_trigger).state)
      );
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"

  - platform: template
    name: "Couch Both Occupied"
    device_class: occupancy
    lambda: |-
      int active = 0;
      active += (id(z1_pressure).state > id(z1_trigger).state);
      active += (id(z2_pressure).state > id(z2_trigger).state);
      active += (id(z3_pressure).state > id(z3_trigger).state);
      active += (id(z4_pressure).state > id(z4_trigger).state);
      active += (id(z5_pressure).state > id(z5_trigger).state);
      active += (id(z6_pressure).state > id(z6_trigger).state);
      return active >= 2;
    filters:
      - delayed_on: !lambda "return id(deb_on);"
      - delayed_off: !lambda "return id(deb_off);"
