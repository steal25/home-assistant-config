# -------------------- Capture Buttons --------------------
button:
  - platform: template
    name: "Z1 Capture Unoccupied"
    on_press:
      - lambda: "id(z1_unocc)=id(z1_raw).state;"
  - platform: template
    name: "Z1 Capture Occupied"
    on_press:
      - lambda: "id(z1_occ)=id(z1_raw).state;"

  - platform: template
    name: "Z2 Capture Unoccupied"
    on_press:
      - lambda: "id(z2_unocc)=id(z2_raw).state;"
  - platform: template
    name: "Z2 Capture Occupied"
    on_press:
      - lambda: "id(z2_occ)=id(z2_raw).state;"

  - platform: template
    name: "Z3 Capture Unoccupied"
    on_press:
      - lambda: "id(z3_unocc)=id(z3_raw).state;"
  - platform: template
    name: "Z3 Capture Occupied"
    on_press:
      - lambda: "id(z3_occ)=id(z3_raw).state;"

  - platform: template
    name: "Z4 Capture Unoccupied"
    on_press:
