esphome:
  name: esphome-web-787098
  friendly_name: Living Room Couch Presence
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# -------------------- UX Controls like Elevated --------------------
select:
  - platform: template
    id: response_speed
    name: "Response Speed"
    optimistic: true
    options: [Fast, Normal, Slow]
    initial_option: Normal
    set_action:
      - lambda: |-
          if (x == "Fast")  { id(deb_on) = 100;  id(deb_off) = 700;  }
          else if (x == "Slow") { id(deb_on) = 300;  id(deb_off) = 2000; }
          else { id(deb_on) = 200; id(deb_off) = 1200; }

switch:
  - platform: template
    id: full_range
    name: "Full Range"
    optimistic: true
    restore_mode: 'ALWAYS_ON'

# -------------------- Globals --------------------
globals:
  - id: deb_on
    type: int
    initial_value: "200"
  - id: deb_off
    type: int
    initial_value: "1200"

  # Per-zone captured calibration values
  - id: z1_unocc
    type: float
    initial_value: "0.08"
  - id: z1_occ
    type: float
    initial_value: "0.80"
  - id: z2_unocc
    type: float
    initial_value: "0.08"
  - id: z2_occ
    type: float
    initial_value: "0.80"
  - id: z3_unocc
    type: float
    initial_value: "0.08"
  - id: z3_occ
    type: float
    initial_value: "0.80"
  - id: z4_unocc
    type: float
    initial_value: "0.08"
  - id: z4_occ
    type: float
    initial_value: "0.80"
  - id: z5_unocc
    type: float
    initial_value: "0.08"
  - id: z5_occ
    type: float
    initial_value: "0.80"
  - id: z6_unocc
    type: float
    initial_value: "0.08"
  - id: z6_occ
    type: float
    initial_value: "0.80"

  # Per-zone observed extremes (for Full Range mode)
  - id: z1_min
    type: float
    initial_value: "10.0"
  - id: z1_max
    type: float
    initial_value: "0.0"
  - id: z2_min
    type: float
    initial_value: "10.0"
  - id: z2_max
    type: float
    initial_value: "0.0"
  - id: z3_min
    type: float
    initial_value: "10.0"
  - id: z3_max
    type: float
    initial_value: "0.0"
  - id: z4_min
    type: float
    initial_value: "10.0"
  - id: z4_max
    type: float
    initial_value: "0.0"
  - id: z5_min
    type: float
    initial_value: "10.0"
  - id: z5_max
    type: float
    initial_value: "0.0"
  - id: z6_min
    type: float
    initial_value: "10.0"
  - id: z6_max
    type: float
    initial_value: "0.0"

# -------------------- All Sensors (RAW + PRESSURE %) --------------------
sensor:
  # ==== Raw ADC sensors ====
  - platform: adc
    id: z1_raw
    name: "Z1 Raw (V)"
    pin: GPIO32
    attenuation: 11db
    update_interval: 100ms
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    on_value:
      then:
        - lambda: |-
            float v = id(z1_raw).state;
            if (v < id(z1_min)) id(z1_min) = v;
            if (v > id(z1_max)) id(z1_max) = v;

  - platform: adc
    id: z2_raw
    name: "Z2 Raw (V)"
    pin: GPIO33
    attenuation: 11db
    update_interval: 100ms
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    on_value:
      then:
        - lambda: |-
            float v = id(z2_raw).state;
            if (v < id(z2_min)) id(z2_min) = v;
            if (v > id(z2_max)) id(z2_max) = v;

  - platform: adc
    id: z3_raw
    name: "Z3 Raw (V)"
    pin: GPIO34
    attenuation: 11db
    update_interval: 100ms
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    on_value:
      then:
        - lambda: |-
            float v = id(z3_raw).state;
            if (v < id(z3_min)) id(z3_min) = v;
            if (v > id(z3_max)) id(z3_max) = v;

  - platform: adc
