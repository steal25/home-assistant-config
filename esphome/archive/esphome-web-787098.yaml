# -------------------- Trigger Thresholds --------------------
number:
  - platform: template
    id: z1_trigger
    name: "Trigger Pressure Z1 (%)"
    optimistic: true
    min_value: 1
    max_value: 99
    step: 1
    restore_value: true
    initial_value: 30

  - platform: template
    id: z2_trigger
    name: "Trigger Pressure Z2 (%)"
    optimistic: true
    min_value: 1
    max_value: 99
    step: 1
    restore_value: true
    initial_value: 30

  - platform: template
    id: z3_trigger
    name: "Trigger Pressure Z3 (%)"
    optimistic: true
    min_value: 1
    max_value: 99
    step: 1
