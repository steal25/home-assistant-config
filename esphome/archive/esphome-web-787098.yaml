  - platform: adc
    id: z6_raw
    name: "Z6 Raw (V)"
    pin: GPIO39
    attenuation: 11db
    update_interval: 100ms
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    on_value:
      then:
        - lambda: |-
            float v = id(z6_raw).state;
            if (v < id(z6_min)) id(z6_min) = v;
            if (v > id(z6_max)) id(z6_max) = v;

  # ==== Calibrated Pressure % (0–100) ====
  - platform: template
    id: z1_pressure
    name: "Pressure Z1 (%)"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 200ms
    lambda: |-
      auto scale = [&](float x, float lo, float hi)->float {
        if (hi <= lo + 1e-5) return 0.0f;
        float y = (x - lo) / (hi - lo);
        if (y < 0) y = 0; if (y > 1) y = 1;
        return y * 100.0f;
      };
      float x = id(z1_raw).state;
      if (id(full_range).state) return scale(x, id(z1_min), id(z1_max));
      else                      return scale(x, id(z1_unocc), id(z1_occ));

  - platform: template
    id: z2_pressure
    name: "Pressure Z2 (%)"
    unit_of_measurement: "%"
    accuracy_decimals: 0
