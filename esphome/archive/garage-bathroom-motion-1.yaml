esphome:
  name: garage-bathroom-motion-1
  friendly_name: Garage Bathroom Motion 1

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "krhvY/bTOGrnzibflRowvjlNFDIa2IdVdFG7Wp/ulUc="  # from core.config_entries (noise_psk)

ota:
  - platform: esphome
    password: "e81a409af659a1a048b3d75016f4209a"           # sets a new OTA pwd going forward

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Garage-Bathroom-Motion-1"
    password: "EWia2OgfnXtQ"

captive_portal:

web_server:
  port: 80
  include_internal: true

# Bluetooth Proxy (for IRK presence)
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 1100ms
    window: 1100ms

bluetooth_proxy:
  active: true

# Optional status LED
status_led:
  pin:
    number: GPIO2
    inverted: false

# LD2410 wiring (UART)
uart:
  id: ld2410_uart
  tx_pin: GPIO10      # ESP TX -> LD2410 RX
  rx_pin: GPIO9       # ESP RX -> LD2410 TX
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_comp
  uart_id: ld2410_uart
  # 'throttle' removed; see per-sensor filters below

# UI controls
number:
  - platform: ld2410
    timeout:
      name: "LD2410 Timeout (s)"
      id: ld_timeout
    max_move_distance_gate:
      name: "LD2410 Max Move Gate"
      id: ld_max_move_gate
    max_still_distance_gate:
      name: "LD2410 Max Still Gate"
      id: ld_max_still_gate
    light_threshold:
      name: "LD2410 Light Threshold"
      id: ld_light_thr

  # Smart Presence distance limit (0 = disabled)
  - platform: template
    name: "Smart Presence Max Distance (cm)"
    id: smart_max_distance_cm
    optimistic: true
    min_value: 0
    max_value: 600
    step: 10
    restore_value: true
    initial_value: 0

switch:
  - platform: ld2410
    engineering_mode:
      name: "LD2410 Engineering Mode"
      id: ld_eng
    bluetooth:
      name: "LD2410 Control Bluetooth"
      id: ld_bt

button:
  - platform: ld2410
    query_params:
      name: "LD2410 Query Params"
      id: ld_query
  - platform: ld2410
    restart:
      name: "LD2410 Restart"
      id: ld_restart
  - platform: ld2410
    factory_reset:
      name: "LD2410 Factory Reset"
      id: ld_factory

select:
  - platform: ld2410
    distance_resolution:
      name: "LD2410 Distance Resolution"
      id: ld_dist_res
    baud_rate:
      name: "LD2410 Baud Rate"
      id: ld_baud
    light_function:
      name: "LD2410 Light Function"
      id: ld_light_fn
    out_pin_level:
      name: "LD2410 OUT Pin Level"
      id: ld_out_level

# Presence sensors (raw + smart)
binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence"
      id: ld_has_target
  - platform: ld2410
    has_moving_target:
      name: "Moving Target"
      id: ld_moving
  - platform: ld2410
    has_still_target:
      name: "Still Target"
      id: ld_still
  - platform: ld2410
    out_pin_presence_status:
      name: "OUT Pin Presence"
      id: ld_out_pin

  - platform: template
    name: "Smart Presence"
    id: smart_presence
    device_class: presence
    lambda: |-
      bool present = id(ld_has_target).state;
      float max_cm = id(smart_max_distance_cm).state;  // 0 = disabled
      if (max_cm > 0.0f) {
        float d = isnan(id(ld_detect_dist).state) ? 0.0f : id(ld_detect_dist).state;
        if (d <= 0.0f || d > max_cm) present = false;
      }
      return present;
    filters:
      - delayed_on: 200ms
      - delayed_off: 8s

# Diagnostics (with per-sensor throttles)
sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s
    id: wifi_rssi

  - platform: uptime
    name: "Uptime"
    id: dev_uptime

  - platform: ld2410
    moving_distance:
      name: "Moving Distance (cm)"
      id: ld_move_dist
      filters: [ { throttle: 1.5s } ]
    still_distance:
      name: "Still Distance (cm)"
      id: ld_still_dist
      filters: [ { throttle: 1.5s } ]
    detection_distance:
      name: "Distance Detection (cm)"
      id: ld_detect_dist
      filters: [ { throttle: 1.5s } ]
    moving_energy:
      name: "Move Energy (%)"
      id: ld_move_energy
      filters: [ { throttle: 1.5s } ]
    still_energy:
      name: "Still Energy (%)"
      id: ld_still_energy
      filters: [ { throttle: 1.5s } ]
    light:
      name: "Light"
      id: ld_light
      filters: [ { throttle: 1.5s } ]

script:
  - id: preset_small_bathroom
    mode: queued
    then:
      - logger.log: "Applying 'Small Bathroom' LD2410 preset"
      - number.set: { id: ld_max_move_gate,  value: 5 }
      - number.set: { id: ld_max_still_gate, value: 4 }
      - button.press: ld_query
