esphome:
  name: "bathroom-motion-sensor-humidity"
  friendly_name: Bathroom Motion/Humidity

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "aP2GAiEM8AE2MmbiIYv2ylMDd2nYgvSUHa75lD7H+do="

ota:
  - platform: esphome
    password: "3e6cbb01a5ecbbb4dbfe07ac5b129a18"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Motion-Sensor-Extra2"
    password: "vWRJu7Uf0y2J"

captive_portal:

web_server:
  port: 80
  include_internal: true

# ── Bluetooth Proxy (IRK-friendly) ────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 600ms
    window: 600ms

bluetooth_proxy:
  active: true

# ── Status LED (optional) ─────────────────────────────────────────────────────
status_led:
  pin:
    number: GPIO2
    inverted: false

# ── LD2410 wiring (UART) ──────────────────────────────────────────────────────
uart:
  id: ld2410_uart
  tx_pin: GPIO10
  rx_pin: GPIO9
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_comp
  uart_id: ld2410_uart
  # NOTE: 'throttle' removed per ESPHome change. Use per-sensor filters below.

# ── I²C bus for SHT45 (and future SGP41 etc.) ────────────────────────────────
i2c:
  id: bus_a
  sda: GPIO6    # SHT45 SDA
  scl: GPIO7    # SHT45 SCL
  scan: true

# ── UI controls (kept identical across nodes) ─────────────────────────────────
number:
  - platform: ld2410
    timeout:
      name: "LD2410 Timeout (s)"
      id: ld_timeout
    max_move_distance_gate:
      name: "LD2410 Max Move Gate"
      id: ld_max_move_gate
    max_still_distance_gate:
      name: "LD2410 Max Still Gate"
      id: ld_max_still_gate
    light_threshold:
      name: "LD2410 Light Threshold"
      id: ld_light_thr

  # Smart Presence distance limit (0 = disabled)
  - platform: template
    name: "Smart Presence Max Distance (cm)"
    id: smart_max_distance_cm
    optimistic: true
    min_value: 0
    max_value: 600
    step: 10
    restore_value: true
    initial_value: 0

  # ── SHT45 calibration offsets (tweak in HA UI) ──────────────────────────────
  - platform: template
    name: "Bathroom Temp Offset"
    id: bath_temp_offset
    optimistic: true
    min_value: -5.0
    max_value: 5.0
    step: 0.1
    restore_value: true
    initial_value: 0.0

  - platform: template
    name: "Bathroom Humidity Offset"
    id: bath_hum_offset
    optimistic: true
    min_value: -20.0
    max_value: 20.0
    step: 0.5
    restore_value: true
    initial_value: 0.0


switch:
  - platform: ld2410
    engineering_mode:
      name: "LD2410 Engineering Mode"
      id: ld_eng
    bluetooth:
      name: "LD2410 Control Bluetooth"
      id: ld_bt

button:
  - platform: ld2410
    query_params:
      name: "LD2410 Query Params"
      id: ld_query
  - platform: ld2410
    restart:
      name: "LD2410 Restart"
      id: ld_restart
  - platform: ld2410
    factory_reset:
      name: "LD2410 Factory Reset"
      id: ld_factory

select:
  - platform: ld2410
    distance_resolution:
      name: "LD2410 Distance Resolution"
      id: ld_dist_res
    baud_rate:
      name: "LD2410 Baud Rate"
      id: ld_baud
    light_function:
      name: "LD2410 Light Function"
      id: ld_light_fn
    out_pin_level:
      name: "LD2410 OUT Pin Level"
      id: ld_out_level

# ── Text sensors (informational) ──────────────────────────────────────────────
text_sensor:
  - platform: ld2410
    version:
      name: "Presence Sensor Version"
    mac_address:
      name: "Presence Sensor MAC"

# ── Presence sensors (single block) ───────────────────────────────────────────
binary_sensor:
  # Raw LD2410
  - platform: ld2410
    has_target:
      name: "Presence"
      id: ld_has_target
  - platform: ld2410
    has_moving_target:
      name: "Moving Target"
      id: ld_moving
  - platform: ld2410
    has_still_target:
      name: "Still Target"
      id: ld_still
  - platform: ld2410
    out_pin_presence_status:
      name: "OUT Pin Presence"
      id: ld_out_pin

  # Smart Presence (debounced + optional distance limit)
  - platform: template
    name: "Smart Presence"
    id: smart_presence
    device_class: presence
    lambda: |-
      bool present = id(ld_has_target).state;
      float max_cm = id(smart_max_distance_cm).state;  // 0 = disabled
      if (max_cm > 0.0f) {
        float d = isnan(id(ld_detect_dist).state) ? 0.0f : id(ld_detect_dist).state;
        if (d <= 0.0f || d > max_cm) present = false;
      }
      return present;
    filters:
      - delayed_on: 200ms
      - delayed_off: 8s

  # Smart Presence Held (best to use for lights)
  - platform: template
    name: "Smart Presence Held"
    id: smart_presence_held
    device_class: presence
    lambda: |-
      return id(smart_presence).state;
    filters:
      - delayed_off: 60s     # ✅ holds ON through dropouts      

# ── Diagnostics + SHT45 env sensors ───────────────────────────────────────────
sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s
    id: wifi_rssi

  - platform: uptime
    name: "Uptime"
    id: dev_uptime

  # LD2410 diagnostics
  - platform: ld2410
    moving_distance:
      name: "Moving Distance (cm)"
      id: ld_move_dist
      filters:
        - throttle: 1.5s
    still_distance:
      name: "Still Distance (cm)"
      id: ld_still_dist
      filters:
        - throttle: 1.5s
    detection_distance:
      name: "Distance Detection (cm)"
      id: ld_detect_dist
      filters:
        - throttle: 1.5s
    moving_energy:
      name: "Move Energy (%)"
      id: ld_move_energy
      filters:
        - throttle: 1.5s
    still_energy:
      name: "Still Energy (%)"
      id: ld_still_energy
      filters:
        - throttle: 1.5s
    light:
      name: "Light"
      id: ld_light
      filters:
        - throttle: 1.5s

  # ── SHT45 raw, smoothed readings (microenv-style) ───────────────────────────
  - platform: sht4x
    i2c_id: bus_a
    temperature:
      name: "Bathroom SHT45 Temperature Raw"
      id: bath_sht_temp_raw
      accuracy_decimals: 2
      filters:
        # Median to kill spikes
        - median:
            window_size: 5
            send_every: 3
            send_first_at: 1
        # Then EMA for smoothness
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1
    humidity:
      name: "Bathroom SHT45 Humidity Raw"
      id: bath_sht_hum_raw
      accuracy_decimals: 2
      filters:
        - median:
            window_size: 5
            send_every: 3
            send_first_at: 1
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1
    heater_max_duty: 0.0

  # Calibrated temperature (use this for automations if needed)
  - platform: template
    name: "Bathroom Temperature Calibrated"
    id: bath_temp_cal
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(bath_sht_temp_raw).state)) return NAN;
      return id(bath_sht_temp_raw).state + id(bath_temp_offset).state;

  # Calibrated humidity (this is your "truth" sensor)
  - platform: template
    name: "Bathroom Humidity Calibrated"
    id: bath_hum_cal
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(bath_sht_hum_raw).state)) return NAN;
      return id(bath_sht_hum_raw).state + id(bath_hum_offset).state;

  # Dew point (nice extra for bathroom behavior)
  - platform: template
    name: "Bathroom Dew Point"
    id: bath_dewpoint
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(bath_temp_cal).state) || isnan(id(bath_hum_cal).state)) {
        return NAN;
      }
      const float T = id(bath_temp_cal).state;
      const float RH = id(bath_hum_cal).state;
      if (RH <= 0.0f) return NAN;
      const float a = 17.62f;
      const float b = 243.12f;
      const float gamma = (a * T) / (b + T) + log(RH / 100.0f);
      return (b * gamma) / (a - gamma);

# ── Optional preset ───────────────────────────────────────────────────────────
script:
  - id: preset_small_bathroom
    mode: queued
    then:
      - logger.log: "Applying 'Small Bathroom' LD2410 preset"
      - number.set: { id: ld_max_move_gate,  value: 5 }
      - number.set: { id: ld_max_still_gate, value: 4 }
      - button.press: ld_query
