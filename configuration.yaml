cover:
  - platform: template
    covers:
      garage_door:
        unique_id: test_cover_zooz
        device_class: garage
        friendly_name: "Garage Door"

        # Contact sensor: ON = open, OFF = closed
        value_template: >-
          {% if is_state('binary_sensor.garage_door_open_close_sensor', 'on') %}
            open
          {% else %}
            closed
          {% endif %}

        # ----- OPEN -----
        open_cover:
          sequence:
            # If it's closed, we can open it
            - if:
                - condition: state
                  entity_id: binary_sensor.garage_door_open_close_sensor
                  state: "off"
              then:
                - service: switch.turn_on
                  target: { entity_id: switch.garage_door_zooz }

                # Wait up to 20s for the sensor to report OPEN
                - wait_template: "{{ is_state('binary_sensor.garage_door_open_close_sensor','on') }}"
                  timeout: "00:00:20"
                  continue_on_timeout: true

                # Announce result
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ is_state('binary_sensor.garage_door_open_close_sensor','on') }}"
                      sequence:
                        - service: notify.alexa_media
                          target: { entity_id: media_player.all_echos }   # <-- adjust if needed
                          data:
                            media_content_type: tts
                            media_content_id: "The garage door is now open."
                  default:
                    - service: notify.alexa_media
                      target: { entity_id: media_player.all_echos }
                      data:
                        media_content_type: tts
                        media_content_id: "Opening the garage door."
              else:
                # Already open → announce
                - service: notify.alexa_media
                  target: { entity_id: media_player.all_echos }
                  data:
                    media_content_type: tts
                    media_content_id: "The garage door is already open."

        # ----- CLOSE -----
        close_cover:
          sequence:
            # If it's open, we can close it
            - if:
                - condition: state
                  entity_id: binary_sensor.garage_door_open_close_sensor
                  state: "on"
              then:
                - service: switch.turn_on
                  target: { entity_id: switch.garage_door_zooz }

                # Wait up to 20s for the sensor to report CLOSED
                - wait_template: "{{ is_state('binary_sensor.garage_door_open_close_sensor','off') }}"
                  timeout: "00:00:20"
                  continue_on_timeout: true

                # Announce result
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ is_state('binary_sensor.garage_door_open_close_sensor','off') }}"
                      sequence:
                        - service: notify.alexa_media
                          target: { entity_id: media_player.all_echos }
                          data:
                            media_content_type: tts
                            media_content_id: "The garage door is now closed."
                  default:
                    - service: notify.alexa_media
                      target: { entity_id: media_player.all_echos }
                      data:
                        media_content_type: tts
                        media_content_id: "Closing the garage door."
              else:
                # Already closed → announce
                - service: notify.alexa_media
                  target: { entity_id: media_player.all_echos }
                  data:
                    media_content_type: tts
                    media_content_id: "The garage door is already closed."

        # Pulse the relay to stop (if your opener supports it)
        stop_cover:
          service: switch.turn_on
          target:
            entity_id: switch.garage_door_zooz

        icon_template: >-
          {% if is_state('binary_sensor.garage_door_open_close_sensor', 'on') %}
            mdi:garage-open-variant
          {% else %}
            mdi:garage-variant
          {% endif %}



####JBL Shell CMDS

shell_command:
  # Step 1: Handshake - Always send this first after Home Assistant restarts 

  ma510_init: 'printf "\x23\x50\x01\xF0\x0D" | nc 172.25.14.91 50000'

  # Power On / Off 

  ma510_power_on: 'printf "\x23\x00\x01\x01\x0D" | nc 172.25.14.91 50000'
  ma510_power_off: 'printf "\x23\x00\x01\x00\x0D" | nc 172.25.14.91 50000'

  # Volume Set to 40 (you can adjust this — 0x00 to 0x63 = volume 0–99)

  ma510_volume_40: 'printf "\x23\x06\x01\x28\x0D" | nc 172.25.14.91 50000'
  ma510_volume_25: 'printf "\x23\x06\x01\x19\x0D" | nc 172.25.14.91 50000'
  ma510_volume_20: 'printf "\x23\x06\x01\x14\x0D" | nc 172.25.14.91 50000'
  ma510_volume_35: 'printf "\x23\x06\x01\x26\x0D" | nc 172.25.14.91 50000'
  ma510_volume_30: 'printf "\x23\x06\x01\x22\x0D" | nc 172.25.14.91 50000'

  # Mute On / Off

  ma510_mute_on: 'printf "\x23\x07\x01\x01\x0D" | nc 172.25.14.91 50000'
  ma510_mute_off: 'printf "\x23\x07\x01\x00\x0D" | nc 172.25.14.91 50000'

  # Input Selection

  ma510_input_tv: 'printf "\x23\x05\x01\x01\x0D" | nc 172.25.14.91 50000'
  ma510_input_media: 'printf "\x23\x05\x01\x09\x0D" | nc 172.25.14.91 50000'
  
  
