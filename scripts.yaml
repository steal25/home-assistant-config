find_phone_eddie:
  alias: 'Find Phone: Eddie'
  mode: single
  sequence:
  - variables:
      room: '{{ states(''sensor.big_eddie_area'') | default(''Unknown'', true) }}'
      last_called_mp: "{% set s = states('sensor.last_alexa') %} {% if s is string
        and s.startswith('media_player.') %}\n  {{ s }}\n{% else %}\n  {{ '' }}\n{%
        endif %}"
      target_player: "{% if last_called_mp != '' %}\n  {{ last_called_mp }}\n{% else
        %}\n  media_player.all_echos\n{% endif %}"
  - data:
      target:
      - '{{ target_player }}'
      data:
        type: announce
      message: 'Eddie’s phone is in: {{ room }}.'
    action: notify.alexa_media
  description: ''
find_phone_janet:
  alias: 'Find Phone: Janet'
  mode: single
  sequence:
  - variables:
      room: '{{ states(''sensor.janet_area'') | default(''Unknown'', true) }}'
      last_called_mp: "{% set s = states('sensor.last_alexa') %} {% if s is string
        and s.startswith('media_player.') %}\n  {{ s }}\n{% else %}\n  {{ '' }}\n{%
        endif %}"
      target_player: "{% if last_called_mp != '' %}\n  {{ last_called_mp }}\n{% else
        %}\n  media_player.all_echos\n{% endif %}"
  - data:
      target:
      - '{{ target_player }}'
      data:
        type: announce
      message: 'Janet’s phone is in: {{ room }}.'
    action: notify.alexa_media
  description: ''
alexa_find_my_phone:
  alias: Alexa – Find My Phone
  mode: single
  sequence:
  - variables:
      echos:
      - media_player.echo_dot_adu
      - media_player.echo_studio_bathroom
      - media_player.echo_show_kitchen
      - media_player.echo_dot_office
      - media_player.echo_dot_garage_bathroom
      - media_player.echo_dot_max_living_room_left
      - media_player.echo_dot_max_master_bedroom
      last: "{% set found = namespace(v='') %} {% for e in echos %}\n  {% if state_attr(e,'last_called')
        %}\n    {% set found.v = e %}\n    {% break %}\n  {% endif %}\n{% endfor %}
        {{ found.v }}"
      who: "{# CHANGE THIS mapping however you want #} {% if last in ['media_player.echo_dot_office','media_player.echo_dot_adu']
        %}\n  eddie\n{% else %}\n  janet\n{% endif %}"
      room: "{% if who == 'eddie' %}\n  {{ states('sensor.big_eddie_area') }}\n{%
        else %}\n  {{ states('sensor.janet_area') }}\n{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ last != '''' }}'
      sequence:
      - data:
          target:
          - '{{ last }}'
          message: '{{ who|title }}’s phone is in the {{ room }}.'
        action: notify.alexa_media
    default:
    - data:
        target:
        - media_player.echo_show_kitchen
        message: I couldn’t tell which Echo you used. Try again.
      action: notify.alexa_media
  description: ''
find_phone_announce_location:
  alias: Find Phone - Announce Location
  mode: queued
  fields:
    person:
      description: eddie or janet
      example: eddie
  sequence:
  - variables:
      who: '{{ (person | default(''eddie'')) | lower }}'
      room: "{% if who == 'janet' %}\n  {{ states('sensor.janet_area') }}\n{% else
        %}\n  {{ states('sensor.big_eddie_area') }}\n{% endif %}"
      alexas:
      - media_player.echo_studio_bathroom
      - media_player.echo_show_kitchen
      - media_player.echo_dot_office
      - media_player.echo_dot_garage_bathroom
      - media_player.echo_dot_max_living_room_left
      - media_player.echo_dot_max_master_bedroom
      msg: "{% if room in ['unknown','unavailable','none',''] %}\n  {% if who == 'janet'
        %}\n    I can't tell where Janet's phone is right now.\n  {% else %}\n    I
        can't tell where Eddie's phone is right now.\n  {% endif %}\n{% else %}\n
        \ {% if who == 'janet' %}\n    Janet's phone is in the {{ room }}.\n  {% else
        %}\n    Eddie's phone is in the {{ room }}.\n  {% endif %}\n{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ alexas is iterable and (alexas | list | count) > 0 }}'
      sequence:
      - action: notify.alexa_media
        data:
          target: '{{ alexas }}'
          message: '{{ msg }}'
          data:
            type: tts
    default:
    - action: notify.alexa_media
      data:
        message: '{{ msg }}'
        data:
          type: tts
