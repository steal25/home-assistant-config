play_kroq_on_master_bedroom_stereo:
  alias: Play KROQ on Master Bedroom Stereo
  description: ''
  mode: single
  sequence:
  - target:
      entity_id: media_player.denon_avr_master_bedroom
    data:
      source: WiiM Ultra
    action: media_player.select_source
  - delay: 00:00:01
  - action: media_player.select_sound_mode
    target:
      entity_id: media_player.denon_avr_master_bedroom
    data:
      sound_mode: MCH STEREO
  - delay: 00:00:01
  - target:
      entity_id: media_player.denon_avr_master_bedroom
    data:
      volume_level: 0.63
    action: media_player.volume_set
  - delay: 00:00:01
  - action: media_player.play_media
    metadata: {}
    target:
      entity_id: media_player.wiim_pro_master
    data:
      media:
        media_content_id: '1'
        media_content_type: music
        metadata:
          title: KROQ
          thumbnail: http://cdn-profiles.tunein.com/s35088/images/logog.jpg?t=638288249650000000
          media_class: playlist
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: playlist
            media_content_id: wiim_library/library_root/favorites
