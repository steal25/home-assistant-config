alias: Play KROQ on Master Bedroom Stereo
sequence:
- service: shell_command.ma510_init
- delay: 00:00:01
- service: shell_command.ma510_power_on
- delay: 00:00:01
- service: shell_command.ma510_input_media
- delay: 00:00:01
- service: shell_command.ma510_volume_40
- delay: 00:00:02
- service: media_player.play_media
  data:
    entity_id: media_player.wiim_pro
    media_content_type: music
    media_content_id: https://go.audacy.com/kroq/listen
mode: single
