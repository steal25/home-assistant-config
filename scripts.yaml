send_message_to_my_phone:
  alias: Send Message to My Phone
  sequence:
  - action: notify.mobile_app_iphone
    data:
      message: '{{message}}'
      title: '{{title}}'
  description: ''
  icon: mdi:bell-outline
  fields:
    title:
      selector:
        text:
      name: Title
      required: true
      description: Enter a Title
    message:
      selector:
        text:
      name: Message
      description: Enter a Message
