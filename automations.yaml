      - action: tts.cloud_say
        metadata: {}
        data:
          cache: false
          entity_id: media_player.office_home_pod
          message: Washing cycle is completed
      - delay:
          hours: 0
          minutes: 0
          seconds: 2
          milliseconds: 0
