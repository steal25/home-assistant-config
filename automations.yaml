            before: '20:00:00'
            weekday:
            - sat
            - fri
            - thu
            - wed
            - tue
            - mon
            - sun
          sequence:
          - action: script.turn_on
            metadata: {}
            data: {}
            target:
              entity_id: script.media_players_60
          alias: 60% 11-8
        - conditions:
          - condition: time
            after: '20:01:00'
            before: '23:59:59'
            weekday:
            - sat
            - fri
            - thu
            - wed
            - tue
            - mon
            - sun
          sequence:
          - action: script.turn_on
            metadata: {}
            data: {}
            target:
              entity_id: script.media_players_50
