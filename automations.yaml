          state: 'on'
        - condition: time
          after: '23:00:00'
          before: 01:00:00
          weekday:
          - sun
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
        then:
        - action: scene.turn_on
          metadata: {}
          data:
            transition: 1
          target:
