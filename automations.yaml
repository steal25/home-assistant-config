    id: motion_off
  - trigger: numeric_state
    entity_id:
    - sensor.bathroom_humidity_bathroom_humidity_sht45
    above: 70
    id: humid_high
  - trigger: state
    entity_id: switch.wave_1_bathroom_fan_switch
    from: 'off'
    to: 'on'
    id: fan_on
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 10:30pm–12:00am => 1350–1439 #} {% if 1350 <= mod <=
            1439 %}\n  scene.bathroom_lights_1030_12\n{# 12:00am–1:00am => 0–59 #}
            {% elif 0 <= mod <= 59 %}\n  scene.bathroom_lights_12a_1a\n{# 1:00am–5:00am
            => 60–299 #} {% elif 60 <= mod <= 299 %}\n  scene.bathroom_lights_1a_530a\n{#
            5:00am–8:00am => 300–480 #} {% elif 300 <= mod <= 480 %}\n  scene.bathroom_lights_530a_8a\n{#
            8:00am–4:00pm => 481–960 #} {% elif 481 <= mod <= 960 %}\n  scene.bathroom_lights_8a_4p\n{#
            4:00pm–10:30pm => 961–1349 #} {% elif 961 <= mod <= 1349 %}\n  scene.bathroom_lights_4p_1030p\n{#
            Fallback (shouldn't hit) #} {% else %}\n  scene.bathroom_lights_8a_4p\n{%
            endif %}"
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: 'Turned ON via {{ desired_scene }} due to bathroom_presence_final
            going ON.

            '
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - variables:
          shower_active: "{{ is_state('switch.wave_1_bathroom_fan_switch','on')\n
            \  or (states('sensor.bathroom_humidity_bathroom_humidity_sht45') | float(0))
            >= (humidity_threshold | float) }}"
          this_delay: '{{ extended_delay_seconds if shower_active else base_off_delay_seconds
            }}'
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: 'bathroom_presence_final went OFF (debounced). Will wait up to
            {{ this_delay }}s for presence to return (shower_active={{ shower_active
            }}).

            '
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.bathroom_presence_final
          to: 'on'
        timeout: 00:00:{{ this_delay }}
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.completed == true }}'
          sequence:
          - action: logbook.log
            data:
              name: Bathroom Lights
              message: 'bathroom_presence_final returned during wait; keeping ON.
                Aborting OFF.

                '
          - stop: Motion returned; stop off sequence.
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: 'Re-checking: bathroom_presence_final must remain OFF for 5s before
            lights OFF.

            '
      - condition: state
        entity_id: binary_sensor.bathroom_presence_final
        state: 'off'
        for: 00:00:05
      - variables:
          any_sensor_on: "{{\n  expand('binary_sensor.bathroom_motion_sensors')\n
            \ | selectattr('state','eq','on') | list | count > 0\n}}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ any_sensor_on }}'
          sequence:
          - action: logbook.log
            data:
              name: Bathroom Lights
              message: 'At least one underlying bathroom motion sensor still ON; aborting
                OFF.

                '
          - stop: Individual sensor reported ON; stop off sequence.
      - action: light.turn_off
        target:
          entity_id: light.bathroom_ceiling_light_matter
        data:
          transition: 1.5
      - action: scene.turn_on
        data:
          entity_id: scene.bathroom_lights_off
          transition: 1.5
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: 'Turned OFF after {{ this_delay }}s (shower_active={{ shower_active
            }}), with safety re-checks passed.

            '
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: humid_high
        - condition: trigger
          id: fan_on
      - condition: time
        after: '22:30:00'
        before: 03:00:00
      sequence:
      - action: scene.turn_on
        data:
          entity_id: scene.bathroom_lights_late_shower
          transition: 1.5
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: 'Late-shower scene applied due to {{ trigger.id }}

            '
  mode: restart
  variables:
    humidity_threshold: 70
    extended_delay_seconds: 180
    base_off_delay_seconds: "{% set mod = now().hour * 60 + now().minute %} {% if
      1350 <= mod <= 1439 %}\n  15          {# 22:30–24:00 #}\n{% elif 0 <= mod <=
      59 %}\n  15          {# 00:00–01:00 #}\n{% elif 60 <= mod <= 330 %}\n  15          {#
      01:00–05:30 #}\n{% elif 331 <= mod <= 480 %}\n  15          {# 05:30–08:00 #}\n{%
      elif 481 <= mod <= 960 %}\n  15          {# 08:00–16:00 #}\n{% else %}\n  15
      \         {# 16:00–22:30 #}\n{% endif %}"
- id: bath_fan_on_co2_or_shower
  alias: 'FAN CONTROL: Turn ON Bathroom Fan (CO2 high or shower)'
  description: ''
  triggers:
  - alias: CO2 above threshold
    trigger: numeric_state
    entity_id:
    - sensor.bathroom_motion_sensor_co2_bathroom_co2
    above: 1100
  - alias: Humidity rising fast
    trigger: numeric_state
    entity_id:
    - sensor.bathroom_humidity_derivative
    above: 0.2
    for:
      hours: 0
      minutes: 0
      seconds: 30
  conditions:
  - condition: state
    entity_id: binary_sensor.bathroom_presence_final
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.bathroom_motion_sensor_co2_bathroom_co2
        above: 1200
      sequence:
      - target:
          entity_id: switch.wave_1_bathroom_fan_switch
        action: switch.turn_on
    - conditions:
      - condition: template
        value_template: "{{ states('sensor.bathroom_humidity_bathroom_humidity_sht45')
          | float(0) >\n   5 + (states('sensor.bathroom_humidity_baseline') | float(0))
          }}\n"
      sequence:
      - target:
          entity_id: switch.wave_1_bathroom_fan_switch
        action: switch.turn_on
  mode: restart
- id: bath_fan_off_air_normal_empty
  alias: 'FAN CONTROL: Turn OFF Bathroom Fan (air normal + empty)'
  description: ''
  triggers:
  - alias: Periodic check while fan is on
    trigger: time_pattern
    minutes: /3
  conditions:
  - condition: state
    entity_id: switch.wave_1_bathroom_fan_switch
    state: 'on'
  - condition: state
    entity_id: binary_sensor.bathroom_presence_final
    state: 'off'
  - condition: numeric_state
    entity_id: sensor.bathroom_motion_sensor_co2_bathroom_co2
    below: 900
  - condition: template
    value_template: '{% set cur = states(''sensor.bathroom_motion_sensor_hum_calibrated'')
      | float(0) %} {% set base = states(''sensor.bathroom_humidity_baseline'') |
      float(0) %} {{ (cur - base) < 3 }}

      '
  actions:
  - target:
      entity_id: switch.wave_1_bathroom_fan_switch
    action: switch.turn_off
  mode: restart
- id: '1764893147895'
  alias: 'LIGHT CONTROL: Christmas Tree (not christmas streamlined)'
  description: Control Christmas tree on non-Christmas days
  triggers:
  - id: sunset
    event: sunset
    offset: 00:30:00
    trigger: sun
  - id: all_leave
    entity_id: zone.home
    below: 1
    trigger: numeric_state
  - id: someone_home
    entity_id: zone.home
    above: 0
    trigger: numeric_state
  - id: off_2230
    at: '22:30:00'
    trigger: time
  - id: tv_off
    entity_id: media_player.lg_webos_tv_livingroom
    to: 'off'
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ not (now().month == 12 and now().day == 25) }}'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''sunset'' }}'
      - condition: template
        value_template: '{{ people_home > 0 }}'
      sequence:
      - target:
          entity_id: '{{ tree_scenes | random }}'
        data:
          transition: 1.5
        action: scene.turn_on
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.christmas_tree_on
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''off_2230'' }}'
      sequence:
      - target:
          entity_id: scene.christmas_tree_off
        data:
          transition: 1.5
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''all_leave'' }}'
      sequence:
      - target:
          entity_id: scene.christmas_tree_off
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''someone_home'' }}'
      - condition: template
        value_template: '{{ now_time < ''22:30:00'' }}'
      sequence:
      - target:
          entity_id: '{{ tree_scenes | random }}'
        data:
          transition: 1.5
        action: scene.turn_on
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.christmas_tree_on
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''tv_off'' }}'
      - condition: template
        value_template: '{{ ''13:00:00'' <= now_time < ''22:30:00'' }}'
      - condition: template
        value_template: '{{ people_home > 0 }}'
      sequence:
      - target:
          entity_id: '{{ tree_scenes | random }}'
        data:
          transition: 1.5
        action: scene.turn_on
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.christmas_tree_on
        data: {}
  mode: restart
  variables:
    people_home: '{{ states(''zone.home'')|int(0) }}'
    now_time: '{{ now().strftime(''%H:%M:%S'') }}'
    tree_scenes: "{{\n  [\n    'scene.christmas_tree_8',\n    'scene.christmas_tree_candy_cane',\n
      \   'scene.christmas_tree_carnival_tree',\n    'scene.christmas_tree_carnival',\n
      \   'scene.christmas_tree_eclipse',\n    'scene.christmas_tree_fireworks',\n
