      - light.living_room_ceiling_fan_new
      - light.dining_room_group
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Motion Stopped
      sequence:
      - action: timer.start
        target:
          entity_id: timer.night_light
        data: {}
    - conditions:
      - condition: trigger
        id:
        - Motion Detected
        enabled: true
      sequence:
      - action: timer.cancel
        target:
          entity_id:
          - timer.night_light
        data: {}
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.night_light_tv
        data:
          transition: 1.5
        enabled: true
      - if:
        - condition: state
          entity_id: media_player.lg_webos_tv_0f78
          state: 'on'
        then:
        - action: scene.turn_on
          metadata: {}
          data:
            transition: 1
          target:
            entity_id: scene.night_light_tv_on
        else:
        - action: scene.turn_on
          metadata: {}
          data:
            transition: 1
          target:
            entity_id: scene.night_light_tv
        enabled: false
    - conditions:
      - condition: and
        conditions:
        - condition: time
          after: 00:30:00
          before: 06:00:00
        - condition: trigger
          id:
          - Home
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - lock.aqara_smart_lock_u50_living_room
          from: locked
          to: unlocked
