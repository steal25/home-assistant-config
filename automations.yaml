- id: '1758489860692'
  alias: 'LIGHT CONTROL: Closet (streamlined)'
  description: Motion-activated closet lights with time/bed-aware scenes
  triggers:
  - id: motion_on
    alias: Motion detected
    entity_id: binary_sensor.closet_motion_sensors_group
    from: 'off'
    to: 'on'
    trigger: state
  - id: motion_off
    alias: Motion cleared
    entity_id: binary_sensor.closet_motion_sensors_group
    from: 'on'
    to: 'off'
    trigger: state
  - id: timer_done
    alias: Timer finished
    event_type: timer.finished
    event_data:
      entity_id: timer.closet_light_timer
    trigger: event
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: person.edward_steele
      state: home
    - condition: state
      entity_id: person.janet_steele
      state: home
    - condition: state
      entity_id: person.timmy_steele
      state: home
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''motion_off'' }}'
      sequence:
      - target:
          entity_id: timer.closet_light_timer
        data:
          duration: '10'
        action: timer.start
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''motion_on'' }}'
      sequence:
      - target:
          entity_id: timer.closet_light_timer
        action: timer.cancel
      - target:
          entity_id: '{{ scene_entity }}'
        data:
          transition: 1.5
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''timer_done'' }}'
      sequence:
      - target:
          entity_id:
          - light.hue_closet_1
          - light.hue_closet_2
          - light.hue_closet_3
        data:
          transition: 1.5
        action: light.turn_off
  mode: restart
  variables:
    now_str: '{{ now().strftime(''%H:%M:%S'') }}'
    sleeping: "{{ is_state('binary_sensor.eddie_in_bed','on')\n   or is_state('binary_sensor.janet_in_bed','on')
      }}\n"
    scene_entity: "{% set t = now().strftime('%H:%M:%S') %} {% if '22:30:01' <= t
      <= '23:59:59' %}\n  scene.closet_1030_12\n{% elif '00:00:00' <= t < '02:00:00'
      %}\n  scene.closet_12_530\n{% elif '02:00:01' <= t <= '11:59:59' %}\n  {{ 'scene.closet_530_730_janet_in_bed'
      if sleeping else 'scene.closet_530_730_janet_not_in_bed' }}\n{% elif '12:00:00'
      <= t <= '16:00:00' %}\n  scene.closet730am_4pm\n{% elif '16:00:01' <= t <= '22:30:00'
      %}\n  scene.closet_4_1030\n{% else %}\n  scene.closet_4_1030\n{% endif %}\n"
- id: light_control_garage_streamlined
  alias: 'LIGHT CONTROL: Garage (streamlined)'
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.garage_motion_sensors
    to: 'on'
    id: motion_on
  - trigger: state
    entity_id: binary_sensor.garage_motion_sensors
    to: 'off'
    id: motion_off
  - trigger: state
    entity_id:
    - light.garage_light_1_new
    - light.garage_light_2_new
    - light.garage_light_3_new
    - light.garage_light_4_new
    from: 'off'
    to: 'on'
    id: manual_on
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: motion_on
        - condition: trigger
          id: manual_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{% if 420 <= mod <= 1320 %}\n  scene.garage_lights_on          {#
            07:00–22:00 #}\n{% else %}\n  scene.garage_lights_after_10p            {#
            22:00–06:59:59 #}\n{% endif %}"
      - data:
          entity_id: '{{ desired_scene }}'
        action: scene.turn_on
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - wait_for_trigger:
        - entity_id: binary_sensor.garage_motion_sensors
          to: 'on'
          trigger: state
        timeout: 00:00:{{ off_delay_seconds }}
        continue_on_timeout: true
      - condition: template
        value_template: '{{ wait.completed == false }}'
      - data:
          entity_id: scene.garage_lights_off
        action: scene.turn_on
  mode: restart
  variables:
    off_delay_seconds: 60
- id: light_control_garage_bathroom_hybrid
  alias: 'LIGHT CONTROL: Garage Bathroom (mmWave group only)'
  description: ON when mmWave motion group turns on; OFF only after the group is clear
    (timer). Restart-safe with timer.
  triggers:
  - trigger: state
    entity_id: binary_sensor.group_garage_bathroom_motion
    to: 'on'
    id: group_on
  - trigger: state
    entity_id: binary_sensor.group_garage_bathroom_motion
    to: 'off'
    id: motion_group_off
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.timer_garage_bathroom_light
    id: timer_done
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: group_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 07:00–09:59 => 420–599 #} {% if 420 <= mod <= 599 %}\n
            \ scene.garage_bathroom_lights_7a_10a_50\n{# 10:00–19:59 => 600–1199 #}
            {% elif 600 <= mod <= 1199 %}\n  scene.garage_bathroom_lights_10a_8p\n{#
            20:00–06:59 (wrap) => night scene #} {% else %}\n  scene.garage_bathroom_lights_8p_7a\n{%
            endif %}"
      - action: logbook.log
        data:
          name: Garage Bath ON
          message: TRIGGER={{ trigger.id }}  mod={{ mod }}  someone_home={{ someone_home
            }}  scene={{ desired_scene }}
      - condition: template
        value_template: '{{ someone_home }}'
      - action: timer.cancel
        target:
          entity_id: timer.timer_garage_bathroom_light
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
    - conditions:
      - condition: trigger
        id: motion_group_off
      sequence:
      - action: timer.start
        target:
          entity_id: timer.timer_garage_bathroom_light
        data:
          duration: 00:00:{{ off_delay_seconds }}
      - action: logbook.log
        data:
          name: Garage Bath Clear
          message: All sensors clear → timer {{ off_delay_seconds }}s
    - conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.garage_bathroom_double_switch
        data:
          transition: 1
      - action: scene.turn_on
        data:
          entity_id: scene.garage_bathroom_lights_off
          transition: 1
      - action: logbook.log
        data:
          name: Garage Bath Timer
          message: Lights off (timer_done).
  mode: restart
  variables:
    off_delay_seconds: 10
    someone_home: "{{ is_state('person.edward_steele','home')\n   or is_state('person.janet_steele','home')\n
      \  or is_state('person.timmy_steele','home') }}"
- id: light_control_master_door_driveway_streamlined
  alias: 'LIGHT CONTROL: Master Door/Driveway Lights (streamlined)'
  description: ''
  triggers:
  - id: door_opened
    entity_id:
    - binary_sensor.master_bedroom_door_opened
    to:
    - 'on'
    trigger: state
  - id: door_closed
    entity_id:
    - binary_sensor.master_bedroom_door_opened
    to:
    - 'off'
    trigger: state
  - id: motion_on
    entity_id: binary_sensor.driveway_motion_sensor_motion_detection
    to: 'on'
    trigger: state
  - id: motion_off
    entity_id: binary_sensor.driveway_motion_sensor_motion_detection
    to: 'off'
    trigger: state
  - id: manual_on_flood1
    entity_id: light.garage_door_flood_lights_new
    to: 'on'
    trigger: state
  - id: manual_on_flood2
    entity_id: light.garage_side_flood_lights_new
    to: 'on'
    trigger: state
  - id: manual_on_hue
    entity_id: light.light_hue_back_driveway
    to: 'on'
    trigger: state
  - id: timer_done
    event_type: timer.finished
    event_data:
      entity_id: timer.master_bedroom_door_light_timer
    trigger: event
  conditions:
  - condition: sun
    after: sunset
    before: sunrise
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: door_opened
      sequence:
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        action: timer.cancel
      - target:
          entity_id: '{{ group_light }}'
        data:
          transition: 1
        action: light.turn_on
      - data:
          name: Driveway Lights
          message: Door opened → lights ON & timer cancelled.
        action: logbook.log
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: manual_on_flood1
        - condition: trigger
          id: manual_on_flood2
        - condition: trigger
          id: manual_on_hue
      sequence:
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        action: timer.cancel
      - data:
          name: Driveway Lights
          message: Manual ON detected → cancel OFF timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        action: timer.cancel
      - data:
          name: Driveway Lights
          message: Motion ON → cancel OFF timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: door_closed
      - condition: template
        value_template: '{{ is_state(motion_entity, ''off'') }}'
      sequence:
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: 00:00:{{ off_delay_seconds }}
        action: timer.start
      - data:
          name: Driveway Lights
          message: Door closed & no motion → start {{ off_delay_seconds }}s timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: 00:00:{{ off_delay_seconds }}
        action: timer.start
      - data:
          name: Driveway Lights
          message: Motion OFF → start {{ off_delay_seconds }}s timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - target:
          entity_id: '{{ group_light }}'
        data:
          transition: 1
        action: light.turn_off
      - data:
          name: Driveway Lights
          message: Timer finished → lights OFF.
        action: logbook.log
  mode: restart
  variables:
    group_light: light.backyard_night_lights
    off_delay_seconds: 300
    motion_entity: binary_sensor.driveway_motion_sensor_motion_detection
- id: '1760209756220'
  alias: 'FAN CONTROL: Bathroom Humidity'
  description: ''
  use_blueprint:
