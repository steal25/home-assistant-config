- id: '1749502495589'
  alias: 'LIGHT CONTROL: Front Yard Under Eave Lights'
  description: ''
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: sunset
  - trigger: time
    at: 05:00:00
    id: 5am
  - alias: New Years Day
    trigger: template
    value_template: "        {% set today = now().date() %}\n        {% set start
      = today.replace(month=1, day=1) %}\n        {% set end = today.replace(month=1,
      day=6) %}\n        {{ start <= today <= end }}"
    id: jan1
  - alias: Valentines
    trigger: template
    value_template: '{% set today = now().date() %} {% set valentine = today.replace(month=2,
      day=14) %} {% set start = valentines - timedelta(days=5) %} {% set end = valentines
      + timedelta(days=5) %} {{ start <= today <= end }}'
    id: Valentines
  - alias: Easter
    trigger: template
    value_template: '{% set year = now().year %} {% set a = year % 19 %} {% set b
      = year // 100 %} {% set c = year % 100 %} {% set d = b // 4 %} {% set e = b
      % 4 %} {% set f = (b + 8) // 25 %} {% set g = (b - f + 1) // 3 %} {% set h =
      (19 * a + b - d - g + 15) % 30 %} {% set i = c // 4 %} {% set k = c % 4 %} {%
      set l = (32 + 2 * e + 2 * i - h - k) % 7 %} {% set m = (a + 11 * h + 22 * l)
      // 451 %} {% set month = (h + l - 7 * m + 114) // 31 %} {% set day = ((h + l
      - 7 * m + 114) % 31) + 1 %} {% set easter = today.replace(month=month, day=day)
      %} {% set start = easter - timedelta(days=5) %} {% set end = easter + timedelta(days=5)
      %} {{ start <= now().date() <= end }}'
    id: easter
  - alias: Mothers Day
    trigger: template
    value_template: "{% set year = now().year %} {% set may_sundays = range(1, 15)
      \n  | map('int') \n  | map('today.replace', year=year, month=5) \n  | selectattr('weekday',
      'equalto', 6) \n  | list %}\n{% set mothers_day = may_sundays[1] %} {% set start
      = mothers_day - timedelta(days=3) %} {% set end = mothers_day + timedelta(days=3)
      %} {{ start <= now().date() <= end }}"
    id: mothers
  - alias: Fathers Day
    trigger: template
    value_template: "{% set year = now().year %} {% set june_sundays = range(1, 22)
      \n  | map('int') \n  | map('today.replace', year=year, month=6) \n  | selectattr('weekday',
      'equalto', 6) \n  | list %}\n{% set fathers_day = june_sundays[2] %} {% set
      start = fathers_day - timedelta(days=3) %} {% set end = fathers_day + timedelta(days=3)
      %} {{ start <= now().date() <= end }}"
    id: fathers
  - alias: Juneteenth
    trigger: template
    value_template: "        {% set today = now().date() %}\n        {% set start
      = today.replace(month=6, day=18) %}\n        {% set end = today.replace(month=6,
      day=20) %}\n        {{ start <= today <= end }}"
    id: juneteenth
  - trigger: template
    value_template: '{% set today = now().date() %} {% set july4 = today.replace(month=7,
      day=4) %} {% set start = july4 - timedelta(days=5) %} {% set end = july4 + timedelta(days=5)
      %} {{ start <= today <= end }}

      '
    id: july4
    alias: 4th Of July
  - trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=10,
      day=25) %} {% set end = today.replace(month=11, day=5) %} {{ start <= today
      <= end }}'
    alias: Halloween
    id: holloween
  - alias: Thanksgiving
    trigger: template
    value_template: "{% set today = now().date() %} {% set year = today.year %} {%
      set thanksgiving = (range(22, 29)\n  | map('int')\n  | map('today.replace',
      year=year, month=11)\n  | selectattr('weekday', 'equalto', 3)\n  | list)[0]
      %}\n{% set start = thanksgiving - timedelta(days=5) %} {% set end = thanksgiving
      + timedelta(days=5) %} {{ start <= today <= end }}"
    id: thanksgiving
  - alias: Christmas
    trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=12,
      day=5) %} {% set end = today.replace(month=12, day=30) %} {{ start <= today
      <= end }}'
    id: christmas
  - trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=9,
      day=21) %} {% set end = today.replace(month=12, day=21) %} {{ start <= today
      <= end }}'
    id: Fall
    alias: Fall
  - trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=12,
      day=22) %} {% set end = today.replace(month=3, day=20) %} {{ start <= today
      <= end }}'
    id: winter
    alias: Winter
  - trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=3,
      day=21) %} {% set end = today.replace(month=6, day=21) %} {{ start <= today
      <= end }}'
    id: spring
    alias: Summer
  - trigger: template
    value_template: '{% set today = now().date() %} {% set start = today.replace(month=6,
      day=22) %} {% set end = today.replace(month=9, day=20) %} {{ start <= today
      <= end }}'
    id: Summer
    alias: Summer
  conditions: []
  actions:
  - alias: Holidays
    choose:
    - conditions:
      - condition: and
