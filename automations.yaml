        - condition: trigger
          id:
          - Drying
        - condition: trigger
          id:
          - Dryer Power
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 00:01:00
            before: '11:00:00'
            weekday:
            - sun
            - mon
