- id: announcement_basic_door_chime_homepods
  alias: 'ANNOUNCEMENT: Door/Window Chime (HomePods, MP3)'
  description: 'Plays a door chime on HomePods when doors or windows open. Skips Office
    HomePod 05:30–11:00 if Eddie is in bed. Suppresses all chimes for 10 min on late
    arrival (separate automation below).

    '
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.front_door
    - binary_sensor.kitchen_door
    - binary_sensor.kitchen_front_side_window_sensor_1
    - binary_sensor.contact_sensor_gen2_master_window
    - binary_sensor.contact_sensor_living_room_front
    - binary_sensor.contact_sensor_office_north
    - binary_sensor.contact_sensor_office_west
    - binary_sensor.contact_sensor_timmys_room
    to: 'on'
    id: opened
  conditions:
  - condition: state
    entity_id: input_boolean.door_chime_muted
    state: 'off'
  actions:
  - variables:
      chime: media-source://media_source/local/ring_doorbell_navi.mp3
      mod: '{{ now().hour * 60 + now().minute }}'
      eddie_in_bed: '{{ is_state(''binary_sensor.eddie_in_bed'', ''on'') }}'
      in_morning_quiet: '{{ 330 <= mod < 660 }}'
      all_players: '{{ [''media_player.living_room_home_pod'',''media_player.office_home_pod'']
        }}

        '
      players: "{% if in_morning_quiet and eddie_in_bed %}\n  {{ ['media_player.living_room_home_pod']
        }}\n{% else %}\n  {{ all_players }}\n{% endif %}\n"
  - repeat:
      for_each: '{{ players }}'
      sequence:
      - action: media_player.volume_set
        data:
          volume_level: 0.5
        target:
          entity_id: '{{ repeat.item }}'
      - action: media_player.play_media
        target:
          entity_id: '{{ repeat.item }}'
        data:
          media:
            media_content_id: '{{ chime }}'
            media_content_type: audio/mpeg
            metadata:
              title: Door Chime
      - delay: 00:00:02
      - action: media_player.volume_set
        data:
          volume_level: 0.2
        target:
          entity_id: '{{ repeat.item }}'
  mode: single
