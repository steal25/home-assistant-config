- id: '1777139852879'
  alias: 'AUDIO CONTROL: Garage Radio/AirPlay'
  description: ''
  triggers:
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_garage_radio
    id: timer_finished
    trigger: event
  - entity_id: binary_sensor.group_garage_radio_motion_sensor
    from: 'on'
    to: 'off'
    for: 00:00:15
    id: motion_stopped
    trigger: state
  - entity_id: binary_sensor.group_garage_radio_motion_sensor
    from: 'off'
    to: 'on'
    for: 00:00:02
    id: motion_detected
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_stopped
      - condition: state
        entity_id: input_boolean.garage_radio_auto_started
        state: 'on'
      sequence:
      - action: timer.start
        target:
          entity_id: timer.timer_garage_radio
    - conditions:
      - condition: trigger
        id: motion_detected
      - condition: state
        entity_id: person.edward_steele
        state: home
      - condition: time
        after: 07:00:00
        before: '23:00:00'
      sequence:
      - action: timer.cancel
        target:
          entity_id: timer.timer_garage_radio
      - choose:
        - conditions:
          - condition: state
            entity_id: media_player.wiim_pro_garage
            state: playing
          sequence: []
        default:
        - action: media_player.play_media
          target:
            entity_id: media_player.wiim_pro_garage
          data:
            media:
              media_content_id: '1'
              media_content_type: music
              metadata:
                title: KROQ
                thumbnail: http://cdn-profiles.tunein.com/s35088/images/logog.jpg?t=638288249650000000
                media_class: playlist
                children_media_class:
                navigateIds:
                - {}
                - media_content_type: playlist
                  media_content_id: wiim_library/library_root/favorites
                browse_entity_id: media_player.wiim_pro_garage
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.garage_radio_auto_started
    - conditions:
      - condition: trigger
        id: timer_finished
      - condition: state
        entity_id: input_boolean.garage_radio_auto_started
        state: 'on'
      sequence:
      - action: media_player.media_pause
        target:
          entity_id: media_player.wiim_pro_garage
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.garage_radio_auto_started
  mode: restart
