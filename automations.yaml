- id: end_of_day_smart_bed_logic
  alias: End Of Day (bed-driven, no stray timers)
  triggers:
  - trigger: template
    id: bed_ok_for_5
    value_template: '{% set ed_home = is_state(''person.edward_steele'',''home'')
      %} {% set both_in_bed = is_state(''binary_sensor.both_in_bed_2'',''on'') %}
      {% set janet_in_bed = is_state(''binary_sensor.bed_occupancy_sensor_2_bed_occupied_right'',''on'')
      %} {{ (ed_home and both_in_bed) or ((not ed_home) and janet_in_bed) }}'
    for: 00:05:00
  - trigger: time
    at: 02:30:00
    id: sweep_0230
  conditions:
  - condition: time
    after: '22:30:00'
    before: 05:30:00
  actions:
  - action: logbook.log
    data:
      name: End of Day
      message: Triggered by {{ trigger.id }} — eddie_home={{ is_state('person.edward_steele','home')
        }}, both_in_bed={{ is_state('binary_sensor.both_in_bed_2','on') }}, janet_in_bed={{
        is_state('binary_sensor.bed_occupancy_sensor_2_bed_occupied_right','on') }}.
  - choose:
    - conditions:
      - condition: trigger
        id: bed_ok_for_5
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.bathroom_motion_sensors
            state: 'on'
          sequence:
          - wait_for_trigger:
            - trigger: state
              entity_id: binary_sensor.bathroom_motion_sensors
              to: 'off'
            timeout: 00:10:00
          - action: logbook.log
            data:
              name: End of Day
              message: Bathroom was occupied; deferred up to 10 min.
      - action: cover.close_cover
        target:
          entity_id: cover.garage_door
      - action: switch.toggle
        target:
          entity_id: switch.tundra_alarm_new
      - action: lock.lock
        target:
          entity_id: lock.all_the_locks
      - action: media_player.media_stop
        target:
          entity_id: media_player.wiim_pro_garage
      - action: fan.turn_off
        target:
          entity_id:
          - fan.living_room_ceiling_fan_new
          - fan.office_ceiling_fan_new
    - conditions:
      - condition: trigger
        id: sweep_0230
      - condition: template
        value_template: '{% set ed_home = is_state(''person.edward_steele'',''home'')
          %} {% set both_in_bed = is_state(''binary_sensor.both_in_bed_2'',''on'')
          %} {% set janet_in_bed = is_state(''binary_sensor.bed_occupancy_sensor_2_bed_occupied_right'',''on'')
          %} {{ (ed_home and both_in_bed) or ((not ed_home) and janet_in_bed) }}'
      sequence:
      - action: logbook.log
        data:
          name: End of Day
          message: 02:30 sweep matched bed condition — executing EoD sequence.
      - action: cover.close_cover
        target:
          entity_id: cover.garage_door
      - action: switch.toggle
        target:
          entity_id: switch.tundra_alarm_new
      - action: lock.lock
        target:
          entity_id: lock.all_the_locks
      - action: media_player.media_stop
        target:
          entity_id: media_player.wiim_pro_garage
      - action: fan.turn_off
        target:
          entity_id:
          - fan.living_room_ceiling_fan_new
          - fan.office_ceiling_fan_new
  - condition: template
    value_template: '{{ expand(''light.all_the_lights'') | selectattr(''state'',''eq'',''on'')
      | list | count > 0 }}'
  - action: logbook.log
    data:
      name: End of Day
      message: "Turning off: {{\n  expand('light.all_the_lights')\n  | selectattr('state','eq','on')\n
        \ | map(attribute='entity_id') | list\n}}"
  - action: light.turn_off
    target:
      entity_id: light.all_the_lights
    data:
      transition: 1
  - action: cover.close_cover
    target:
      entity_id: cover.all_the_blinds_matter
  mode: single
