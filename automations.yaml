- &id003
  id: sprinklers_weather_openmeteo_service_pirate_ui
  alias: 'SWITCH: Front Yard Sprinklers (weather-aware w/ UI status)'
  triggers:
  - trigger: time
    at: '23:00:00'
  - trigger: time
    at: 05:00:00
  actions:
  - variables:
      base_minutes: '{{ states(''input_number.sprinklers_front_minutes'') | int(6)
        }}'
      look_ahead_hours: 12
      rain_prob_threshold: 60
      rain_amount_threshold_mm: 1.5
      wind_threshold_mph: 20
      freeze_threshold_c: 2
      wx_entity: weather.big_home
      s_prob: sensor.pirateweather_precip_probability
      s_intensity: sensor.pirateweather_precip_intensity
      s_temp_c: sensor.pirateweather_temperature
      s_wind_mph: sensor.pirateweather_wind_speed
      s_gust_mph: sensor.pirateweather_wind_gust
  - variables:
      season_factor: '{% if is_state(''binary_sensor.season_summer_window'',''on'')
        %} 1.30 {% elif is_state(''binary_sensor.season_spring_window'',''on'') %}
        1.10 {% elif is_state(''binary_sensor.season_fall_window'',''on'') %} 1.00
        {% else %} 0.80 {% endif %}'
      run_minutes: '{{ ((base_minutes | default(6) | int) * (season_factor | float))
        | round(0) | int }}'
  - data:
      entity_id: '{{ wx_entity }}'
      type: hourly
    response_variable: wxresp
    action: weather.get_forecasts
  - variables:
      fc_list: '{{ (wxresp[wx_entity].forecast if wxresp and wxresp.get(wx_entity)
        else []) }}'
      now_ts: '{{ as_timestamp(now()) }}'
      cutoff_ts: '{{ now_ts + (look_ahead_hours | int) * 3600 }}'
      cur_prob: '{{ states(s_prob) | float(0) }}'
      cur_intensity_mmph: '{{ states(s_intensity) | float(0) }}'
      cur_temp_c: '{{ states(s_temp_c) | float(0) }}'
      cur_wind_mph: '{{ states(s_wind_mph) | float(0) }}'
      cur_gust_mph: '{{ states(s_gust_mph) | float(0) }}'
      wind_now: '{{ [cur_wind_mph | float(0), cur_gust_mph | float(0)] | max }}'
      rainy_now: '{{ (cur_intensity_mmph | float(0)) > 0 or (cur_prob | float(0))
        >= (rain_prob_threshold | float(0)) }}'
      prob_skip: "{% set hit = false %} {% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set p = (it.get('precipitation_probability',
        0) | float(0)) %}\n      {% if p >= (rain_prob_threshold | float(0)) %}\n
        \       {% set hit = true %}\n      {% endif %}\n    {% endif %}\n  {% endif
        %}\n{% endfor %} {{ hit }}"
      amount_skip: "{% set total = 0.0 %} {% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set mm = (it.get('precipitation',
        0) | float(0)) %}\n      {% set total = total + mm %}\n    {% endif %}\n  {%
        endif %}\n{% endfor %} {{ total >= (rain_amount_threshold_mm | float(0)) }}"
      wind_skip: '{{ (wind_now | float(0)) >= (wind_threshold_mph | float(0)) }}'
      freeze_skip: '{{ (cur_temp_c | float(0)) <= (freeze_threshold_c | float(0))
        }}'
      should_skip: "{{ (rainy_now or prob_skip or amount_skip or wind_skip or freeze_skip)\n
        \  and not is_state('input_boolean.water_anyway','on') }}"
  - data:
      name: Sprinklers
      message: 'run={{ run_minutes }}m | now: prob={{ cur_prob }}%, rain={{ cur_intensity_mmph
        }}mm/h, temp={{ cur_temp_c }}°C, wind={{ wind_now }} mph | skip={{ should_skip
        }} (now={{ rainy_now }}, prob={{ prob_skip }}, amount={{ amount_skip }}, wind={{
        wind_skip }}, freeze={{ freeze_skip }}) | override={{ is_state(''input_boolean.water_anyway'',''on'')
        }}'
    action: logbook.log
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ should_skip | bool }}'
      sequence:
      - target:
          entity_id: input_boolean.sprinklers_skipped_last
        action: input_boolean.turn_on
      - target:
          entity_id: input_text.sprinklers_last_reason
        data:
          value: 'Skipped: rainy_now={{ rainy_now }}, prob={{ prob_skip }}, amount={{
            amount_skip }}, wind={{ wind_skip }}, freeze={{ freeze_skip }}'
        action: input_text.set_value
      - target:
          entity_id: input_datetime.sprinklers_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
      - data:
          title: Sprinklers skipped (weather)
          message: 'Skipped due to weather: now={{ rainy_now }}, prob={{ prob_skip
            }}, precip_total={{ amount_skip }}, wind={{ wind_skip }}, freeze={{ freeze_skip
            }}. Override={{ states(''input_boolean.water_anyway'') }}'
        action: persistent_notification.create
    - conditions:
      - condition: template
        value_template: '{{ not (should_skip | bool) }}'
      sequence:
      - target:
          entity_id: input_boolean.sprinklers_skipped_last
        action: input_boolean.turn_off
      - target:
          entity_id: input_text.sprinklers_last_reason
        data:
          value: Ran zones sequentially ({{ run_minutes }} min each)
        action: input_text.set_value
      - target:
          entity_id: input_datetime.sprinklers_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: switch.front_yard_zone
        action: switch.turn_on
      - delay: 00:{{ run_minutes }}:00
      - target:
          entity_id: switch.front_yard_zone
        action: switch.turn_off
      - target:
          entity_id: switch.walkway_zone
        action: switch.turn_on
      - delay: 00:{{ run_minutes }}:00
      - target:
          entity_id: switch.walkway_zone
        action: switch.turn_off
      - target:
          entity_id: switch.garden_zone
        action: switch.turn_on
      - delay: 00:{{ run_minutes }}:00
      - target:
          entity_id: switch.garden_zone
        action: switch.turn_off
  mode: single
