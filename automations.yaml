    - sun
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    enabled: true
  - condition: state
    entity_id: light.office_ceiling_fan_new
    state: 'off'
  actions:
  - action: light.turn_off
    metadata: {}
    data: {}
    target:
      device_id:
      - 119abe75a8adb8cd91e366d3d6157e8a
