- id: light_control_kitchen_streamlined
  alias: 'LIGHT CONTROL: Kitchen (streamlined)'
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.kitchen_motion_sensors
    to: 'on'
    id: motion_on
  - trigger: state
    entity_id: binary_sensor.kitchen_motion_sensors
    to: 'off'
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          office_on: '{{ is_state(''light.office_ceiling_fan_new'',''on'') }}'
          lux_val: '{{ states(''sensor.lux_sensor_fp2_kitchen'') | float(9999) }}'
          lux_ok: '{{ lux_val < 65 }}'
          someone_home: "{{ is_state('person.edward_steele','home')\n   or is_state('person.janet_steele','home')\n
            \  or is_state('person.timmy_steele','home') }}"
          desired_scene: "{# 22:30–22:59 => 1350–1379 #} {% if 1350 <= mod <= 1379
            %}\n  scene.kitchen_lights_1030p_1130p\n{# 23:00–05:30 (wrap) -> office-specific
            scene choice #} {% elif (mod >= 1380 or mod <= 330) %}\n  {% if office_on
            %}\n    scene.kitchen_lights_1130p_530a_office\n  {% else %}\n    scene.kitchen_lights_1130p_530a\n
            \ {% endif %}\n{# 05:30–07:00 => 330–420 #} {% elif 330 <= mod <= 420
            %}\n  scene.kitchen_lights_530a_700a\n{# 07:00–18:30 => 420–1110 #} {%
            elif 420 < mod <= 1110 %}\n  scene.kitchen_lights_700a_630p\n{# 18:30–21:00
            => 1110–1260 #} {% elif 1110 < mod <= 1260 %}\n  scene.kitchen_lights_63p_900p\n{#
            21:00–22:30 => 1260–1350 #} {% elif 1260 < mod < 1350 %}\n  scene.kitchen_lights_900p_1030p\n{#
            default fallback #} {% else %}\n  scene.kitchen_lights_700a_630p\n{% endif
            %}"
      - data:
          name: Kitchen Motion
          message: 'mod={{ mod }}, office_on={{ office_on }}, lux={{ lux_val }}, lux_ok={{
            lux_ok }}, someone_home={{ someone_home }}, scene={{ desired_scene }}

            '
          entity_id: scene.kitchen_lights_700a_630p
        action: logbook.log
      - condition: template
        value_template: '{{ lux_ok and someone_home }}'
      - data:
          entity_id: '{{ desired_scene }}'
          transition: 1
        action: scene.turn_on
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - wait_for_trigger:
        - entity_id: binary_sensor.kitchen_motion_sensors
          to: 'on'
          trigger: state
        timeout: 00:00:{{ off_delay_seconds }}
        continue_on_timeout: true
      - condition: template
        value_template: '{{ wait.completed == false }}'
      - target:
          entity_id: light.kitchen_lights
        data:
          transition: 1.5
        action: light.turn_off
      - data:
          entity_id: scene.kitchen_lights_off
          transition: 1.5
        action: scene.turn_on
  mode: restart
  variables:
    off_delay_seconds: 15
- id: light_control_house_bathroom_debug
  alias: 'LIGHT CONTROL: House Bathroom (with debug)'
  triggers:
  - trigger: state
    entity_id: binary_sensor.bathroom_motion_sensors
    to: 'on'
    id: motion_on
  - trigger: state
    entity_id: binary_sensor.bathroom_motion_sensors
    to: 'off'
    id: motion_off
  - trigger: numeric_state
    entity_id: sensor.aqara_sensor_bathroom_humidity
    above: 70
    id: humid_high
  - trigger: state
    entity_id: switch.wave_1_bathroom_fan_switch
    from: 'off'
    to: 'on'
    id: fan_on
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 10:30pm–12:00am => 1350–1439 #} {% if 1350 <= mod <=
            1439 %}\n  scene.bathroom_lights_1030_12\n{# 12:00am–1:00am => 0–59 #}
            {% elif 0 <= mod <= 59 %}\n  scene.bathroom_lights_12a_1a\n{# 1:00am–5:30am
            => 60–330 #} {% elif 60 <= mod <= 330 %}\n  scene.bathroom_lights_1a_530a\n{#
            5:30am–8:00am => 331–480 #} {% elif 331 <= mod <= 480 %}\n  scene.bathroom_lights_530a_8a\n{#
            8:00am–4:00pm => 481–960 #} {% elif 481 <= mod <= 960 %}\n  scene.bathroom_lights_8a_4p\n{#
            4:00pm–10:30pm => 961–1349 #} {% elif 961 <= mod <= 1349 %}\n  scene.bathroom_lights_4p_1030p\n{#
            Fallback (shouldn't hit) #} {% else %}\n  scene.bathroom_lights_8a_4p\n{%
            endif %}"
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: Turned ON via {{ desired_scene }} due to motion
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - variables:
          shower_active: "{{ is_state('switch.wave_1_bathroom_fan_switch','on')\n
            \  or (states('sensor.aqara_sensor_bathroom_humidity') | float(0)) >=
            (humidity_threshold | float) }}"
          this_delay: '{{ extended_delay_seconds if shower_active else base_off_delay_seconds
            }}'
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: Motion stopped. Waiting {{ this_delay }}s (Shower active? {{ shower_active
            }})
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.bathroom_motion_sensors
          to: 'on'
        timeout: 00:00:{{ this_delay }}
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.completed == true }}'
          sequence:
          - action: logbook.log
            data:
              name: Bathroom Lights
              message: Motion returned during wait, keeping ON
        - conditions:
          - condition: template
            value_template: '{{ wait.completed == false }}'
          sequence:
          - action: light.turn_off
            target:
              entity_id:
              - light.bathroom_ceiling_light_matter
            data:
              transition: 1.5
          - action: scene.turn_on
            data:
              entity_id: scene.bathroom_lights_off
              transition: 1.5
          - action: logbook.log
            data:
              name: Bathroom Lights
              message: Turned OFF after {{ this_delay }}s (Shower active? {{ shower_active
                }})
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: humid_high
        - condition: trigger
          id: fan_on
      - condition: time
        after: '22:30:00'
        before: 03:00:00
      sequence:
      - action: scene.turn_on
        data:
          entity_id: scene.bathroom_lights_late_shower
          transition: 1.5
      - action: logbook.log
        data:
          name: Bathroom Lights
          message: Late-shower scene applied due to {{ trigger.id }}
  mode: restart
  variables:
    humidity_threshold: 70
    extended_delay_seconds: 180
    base_off_delay_seconds: "{% set mod = now().hour * 60 + now().minute %} {# 22:30–02:00
      -> 30s #} {% if (mod >= 1350) or (mod <= 120) %}\n  30\n{# 02:01–03:00 -> 60s
      #} {% elif 121 <= mod <= 180 %}\n  60\n{# 03:01–05:30 -> 90s #} {% elif 181
      <= mod <= 330 %}\n  90\n{# 05:31–08:00 -> 60s #} {% elif 331 <= mod <= 480 %}\n
      \ 60\n{# 08:01–16:00 -> 60s #} {% elif 481 <= mod <= 960 %}\n  60\n{# 16:01–22:29
      -> 60s #} {% else %}\n  60\n{% endif %}"
