- id: watch_living_room_tv_streamlined
  alias: 'LIGHT CONTROL: Watch Living Room TV (streamlined)'
  triggers:
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    to: playing
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    from: playing
    to: paused
    for: 00:00:05
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    to:
    - idle
    - 'off'
  - trigger: state
    entity_id: media_player.lg_webos_tv_0f78
    to:
    - 'on'
    - 'off'
  - trigger: sun
    event: sunset
    offset: -00:30:00
  - trigger: homeassistant
    event: start
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:30:00
  - condition: time
    before: '23:59:00'
  actions:
  - variables:
      tv_state: '{{ states(''media_player.lg_webos_tv_0f78'') }}'
      roku_state: '{{ states(''media_player.roku_ultra_2024_living_room'') }}'
      desired_scene: "{% if tv_state == 'off' %}\n  scene.emby_stopped\n{% elif roku_state
        == 'playing' %}\n  scene.emby_playing\n{% elif roku_state == 'paused' %}\n
        \ scene.emby_paused\n{% else %}\n  scene.emby_stopped\n{% endif %}"
      transition_secs: '{% if desired_scene == ''scene.emby_playing'' %} 1.5 {% elif
        desired_scene == ''scene.emby_paused'' %} 2 {% else %} 1.5 {% endif %}'
  - data:
      entity_id: '{{ desired_scene }}'
      transition: '{{ transition_secs | default(1.5) | float }}'
    action: scene.turn_on
  mode: single
- id: '1732055280517'
  alias: 'LIGHT CONTROL: Front Porch'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_front_porch_zooz
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: Motion Detected
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_front_porch_zooz
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: Motion Stopped
    to: 'off'
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.front_porch_light_timer
    id: timer finished
  - trigger: state
    entity_id:
    - binary_sensor.front_door
    to: 'on'
    from: 'off'
    id: Door Opened
  - trigger: zone
    entity_id: person.edward_steele
    zone: zone.tiny_house
    event: enter
    id: Eddie Home
  - trigger: zone
    entity_id: person.janet_steele
    zone: zone.tiny_house
    event: enter
    id: Janet Home
  - trigger: event
    event_type: timer.finished
    event_data:
      entity: timer.arrive_home_front_porch_light_timer
    id: Timer 2 Finished
    alias: When timer2 finished event is fired
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_front_porch_zooz
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: Motion Stopped 5
    to: 'off'
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
    enabled: true
    before_offset: 00:30:00
    after_offset: -00:30:00
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Motion Detected
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          transition: 1
        target:
          entity_id: light.hue_front_porch
        enabled: false
      - action: timer.cancel
        metadata: {}
        data: {}
        target:
          entity_id:
          - timer.front_porch_light_timer
          - timer.arrive_home_front_porch_light_timer
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 1
        target:
          entity_id: scene.porch_light_on
    - conditions:
      - condition: trigger
        id:
        - Motion Stopped
      sequence:
      - action: timer.start
        target:
          entity_id: timer.front_porch_light_timer
        data:
          duration: '30'
    - conditions:
      - condition: trigger
        id:
        - Door Opened
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.front_porch_light_timer
      - action: light.turn_on
        metadata: {}
        data:
          transition: 1
          brightness_pct: 100
        target:
          entity_id: light.hue_front_porch
        enabled: false
      - action: scene.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: scene.porch_light_on
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - Eddie Home
          - Janet Home
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.arrive_home_front_porch_light_timer
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: light.hue_front_porch
        enabled: false
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 3
        target:
          entity_id: scene.porch_light_on
      alias: If Eddie or Janet Arrives Home
    - conditions:
      - condition: trigger
        id:
        - Timer 2 Finished
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.front_porch_light_timer
    - conditions:
      - condition: trigger
        id:
        - timer finished
      sequence:
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 4
        target:
          entity_id: scene.front_porch_light_off
    - conditions:
      - condition: trigger
        id:
        - Motion Stopped 5
      sequence:
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 2
        target:
          entity_id: scene.front_porch_light_off
  mode: single
