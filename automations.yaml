- id: '1756924743680'
  alias: 'AUDIO CONTROL: Garage Radio'
  description: ''
  triggers:
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_garage_radio
    id: Timer Finished
    trigger: event
  - entity_id:
    - binary_sensor.group_garage_radio_motion_sensor
    from:
    - 'on'
    id: Motion Stopped
    to:
    - 'off'
    trigger: state
    for:
      hours: 0
      minutes: 0
