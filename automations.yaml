- id: '1771301152177'
  alias: 'LIGHT CONTROL: Kitchen (streamlined v2)'
  description: ''
  triggers:
  - entity_id: binary_sensor.kitchen_motion_sensors
    to: 'on'
    id: motion_on
    trigger: state
  - entity_id: binary_sensor.kitchen_motion_sensors
    to: 'off'
    id: motion_off
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          office_on: '{{ is_state(''light.office_ceiling_fan_new'',''on'') }}'
          lux_state: '{{ states(''sensor.everything_presence_one_kitchen_illuminance'')
            }}'
          lux_val: '{{ lux_state | float(0) }}'
          lux_ok: "{{ lux_state in ['unknown','unavailable','none','']\n   or lux_val
            < 42 }}\n"
          someone_home: "{{ is_state('person.edward_steele','home')\n   or is_state('person.janet_steele','home')\n
            \  or is_state('person.timmy_steele','home') }}\n"
          desired_scene: "{% if 1350 <= mod <= 1379 %}\n  scene.kitchen_lights_1030p_1130p\n{%
            elif (mod >= 1380 or mod <= 299) %}\n  {% if office_on %}\n    scene.kitchen_lights_1130p_530a_office\n
            \ {% else %}\n    scene.kitchen_lights_1130p_530a\n  {% endif %}\n{% elif
            300 <= mod <= 420 %}\n  scene.kitchen_lights_530a_700a\n{% elif 420 <
            mod <= 1110 %}\n  scene.kitchen_lights_700a_630p\n{% elif 1110 < mod <=
            1260 %}\n  scene.kitchen_lights_63p_900p\n{% elif 1260 < mod < 1350 %}\n
            \ scene.kitchen_lights_900p_1030p\n{% else %}\n  scene.kitchen_lights_700a_630p\n{%
            endif %}"
      - data:
          name: Kitchen Motion
          message: 'mod={{ mod }}, office_on={{ office_on }}, lux={{ lux_val }}, lux_ok={{
            lux_ok }}, someone_home={{ someone_home }}, scene={{ desired_scene }}

            '
        action: logbook.log
      - condition: template
        value_template: '{{ lux_ok and someone_home }}'
      - data:
          entity_id: '{{ desired_scene }}'
          transition: 1
        action: scene.turn_on
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - delay:
          seconds: '{{ off_delay_seconds | int(15) }}'
      - condition: state
        entity_id: binary_sensor.kitchen_motion_sensors
        state: 'off'
      - target:
          entity_id: light.kitchen_lights
        data:
          transition: 1.5
        action: light.turn_off
      - data:
          entity_id: scene.kitchen_lights_off
          transition: 1.5
        action: scene.turn_on
  mode: restart
  variables:
    off_delay_seconds: 15
- id: '1772864124047'
  alias: 'FRAGRANCE: Bathroom Pura (combined smart mode v3)'
  description: 'Bathroom Pura automation using pura.start_timer: - Ambient slot 1
    after 30s bathroom occupancy - Toilet override uses slot 2 - Night/day intensity
    logic - Toilet mode only during allowed hours - Cooldown to avoid rapid cycling
    - Humidity lockout during/after showers

    '
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.bathroom_motion_sensors
    to:
    - 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 8
    id: bathroom_occupied_30s
  - trigger: state
    entity_id: binary_sensor.bathroom_motion_sensors
    to: 'off'
    for: 00:00:10
    id: bathroom_vacant_10s
  - trigger: state
    entity_id: binary_sensor.bidet_presence_sensor_bidet_seat_occupied
    to: 'on'
    id: toilet_on
  - trigger: state
    entity_id: binary_sensor.bathroom_motion_sensors
    to: 'off'
    for: 00:01:00
    id: bathroom_vacant_1m
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: bathroom_occupied_30s
      - condition: state
        entity_id: binary_sensor.bidet_presence_sensor_bidet_seat_occupied
        state: 'off'
      - condition: template
        value_template: '{{ humidity_now < humidity_lockout }}'
      - condition: template
        value_template: '{{ not in_cooldown }}'
      sequence:
      - action: pura.start_timer
        data:
          device_id:
          - 5956230c1aea73c2447e07da429b161e
          slot: '1'
          intensity: '{{ ambient_intensity_num }}'
          duration:
            hours: 2
            minutes: 0
            seconds: 0
    - conditions:
      - condition: trigger
        id: bathroom_vacant_10s
      - condition: state
        entity_id: binary_sensor.bidet_presence_sensor_bidet_seat_occupied
        state: 'off'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.pura_bathroom_diffuser_fragrance
        data:
          option: 'off'
      - action: select.select_option
        target:
          entity_id: select.pura_bathroom_diffuser_intensity
        data:
          option: 'off'
    - conditions:
      - condition: trigger
        id: toilet_on
      - condition: template
        value_template: '{{ toilet_mode_allowed }}'
      - condition: template
        value_template: '{{ humidity_now < humidity_lockout }}'
      - condition: template
        value_template: '{{ not in_cooldown }}'
      sequence:
      - action: pura.start_timer
        data:
          device_id:
          - 5956230c1aea73c2447e07da429b161e
          slot: '2'
          intensity: '{{ toilet_intensity_num }}'
          duration:
            hours: 3
            minutes: 0
            seconds: 0
    - conditions:
      - condition: trigger
        id: bathroom_vacant_1m
      - condition: state
        entity_id: binary_sensor.bidet_presence_sensor_bidet_seat_occupied
        state: 'off'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.pura_bathroom_diffuser_fragrance
        data:
          option: 'off'
      - action: select.select_option
        target:
          entity_id: select.pura_bathroom_diffuser_intensity
        data:
          option: 'off'
  mode: restart
  variables:
    pura_device_id: 5956230c1aea73c2447e07da429b161e
    diffuser_entity: select.pura_bathroom_diffuser_fragrance
    intensity_entity: select.pura_bathroom_diffuser_intensity
    toilet_sensor: binary_sensor.bidet_presence_sensor_bidet_seat_occupied
    bathroom_group: binary_sensor.bathroom_motion_sensors
    humidity_entity: sensor.bathroom_humidity_bathroom_humidity_sht45
    humidity_lockout: 70
    cooldown_seconds: 300
    night_start: '22:30:00'
    day_start: 06:30:00
    humidity_now: '{{ states(humidity_entity) | float(0) }}'
    is_night: "{{ now().strftime('%H:%M:%S') >= night_start\n   or now().strftime('%H:%M:%S')
      < day_start }}"
    toilet_mode_allowed: "{{ now().strftime('%H:%M:%S') >= day_start\n   and now().strftime('%H:%M:%S')
      < night_start }}"
    ambient_intensity_num: '{{ 3 if is_night else 5 }}'
    toilet_intensity_num: '{{ 5 if is_night else 8 }}'
    in_cooldown: '{% set lt = this.attributes.last_triggered %} {{ lt is not none
      and (as_timestamp(now()) - as_timestamp(lt)) < cooldown_seconds }}'
