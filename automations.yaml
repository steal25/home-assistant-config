  alias: 'LIGHT CONTROL: Christmas Tree (christmas)'
  description: Christmas Day – base scene + rotating style scenes
  triggers:
  - id: '630'
    at: 06:30:00
    trigger: time
  - id: Midnight
    at: '23:59:00'
    trigger: time
  - id: shuffle
    minutes: /20
    trigger: time_pattern
  conditions:
  - condition: template
    value_template: '{{ now().month == 12 and now().day == 25 }}'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''630'' }}'
      sequence:
      - target:
          entity_id: scene.christmas_tree_on
        action: scene.turn_on
      - target:
          entity_id: '{{ tree_scenes | random }}'
        data:
          transition: 1.5
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''Midnight'' }}'
      sequence:
      - target:
          entity_id: scene.christmas_tree_off
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''shuffle'' }}'
      sequence:
      - target:
          entity_id: '{{ tree_scenes | random }}'
        data:
          transition: 1.5
        action: scene.turn_on
  mode: restart
  variables:
    tree_scenes: "{{\n  [\n    'scene.christmas_tree_8',\n    'scene.christmas_tree_candy_cane',\n
      \   'scene.christmas_tree_carnival_tree',\n    'scene.christmas_tree_carnival',\n
      \   'scene.christmas_tree_eclipse',\n    'scene.christmas_tree_fireworks',\n
      \   'scene.christmas_tree_fixed',\n    'scene.christmas_tree_tree_1',\n    'scene.christmas_tree_tree_2'\n
      \ ]\n}}\n"
