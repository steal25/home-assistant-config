- id: '1778129399330'
  alias: 'ANNOUNCEMENT: Street Sweeper w/ volume control'
  description: ''
  triggers:
  - at: '12:10:00'
    trigger: time
  conditions:
  - condition: time
    weekday:
    - wed
  actions:
  - action: notify.ALL_NOTI_DEVICES
    data:
      message: Dont Forget Today Is Street Sweeper!!!
      title: STREET SWEEPER!!
  - repeat:
      for_each: '{{ all_players }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.item in saved_volumes }}'
        then:
        - action: media_player.volume_set
          data:
            entity_id: '{{ repeat.item }}'
            volume_level: 0.6
  - action: notify.alexa_media
    data:
      target: '{{ alexa_players }}'
      message: Dont forget today is street sweeper
      data:
        type: tts
  - repeat:
      for_each: '{{ homepod_players }}'
      sequence:
      - action: tts.cloud_say
        data:
          cache: false
          entity_id: '{{ repeat.item }}'
          message: Dont forget today is street sweeper
  - delay:
      hours: 0
      minutes: 0
      seconds: 10
      milliseconds: 0
  - repeat:
      for_each: '{{ all_players }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.item in saved_volumes }}'
        then:
        - action: media_player.volume_set
          data:
            entity_id: '{{ repeat.item }}'
            volume_level: '{{ saved_volumes[repeat.item] }}'
  mode: single
  variables:
    alexa_players:
    - media_player.echo_dot_kitchen
    - media_player.echo_dot_max_living_room_left
    - media_player.echo_dot_max_master_bedroom
    - media_player.echo_dot_office
    - media_player.echo_dot_adu
    homepod_players:
    - media_player.office_home_pod
    - media_player.living_room_home_pod
    all_players: '{{ alexa_players + homepod_players }}'
    saved_volumes: "{% set ns = namespace(v={}) %} {% for p in all_players %}\n  {%
      set vol = state_attr(p, 'volume_level') %}\n  {% if vol is number %}\n    {%
      set ns.v = dict(ns.v, **{p: vol}) %}\n  {% endif %}\n{% endfor %} {{ ns.v }}\n"
