        continue_on_timeout: false
      - data:
          entity_id: scene.night_light_tv
          transition: 2
        action: scene.turn_on
      - wait_for_trigger:
        - entity_id: binary_sensor.sensors_night_motion
          to: 'off'
          for: 00:01:00
          trigger: state
        timeout: '24:00:00'
        continue_on_timeout: false
      - data:
          entity_id: scene.night_light_off
          transition: 1.5
        action: scene.turn_on
      alias: Eddie Arrives From Work
    - conditions:
      - condition: trigger
        id: cutoff_053001
      sequence:
      - data:
          entity_id: scene.night_light_off
        action: scene.turn_on
  mode: restart
  variables:
    off_delay_seconds: 90
