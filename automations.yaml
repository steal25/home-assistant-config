- id: '1723393984392'
  alias: 'LIGHT CONTROL: Master Door/Driveway  Light'
  description: driveway light comes on when master door is opened
  triggers:
  - type: opened
    device_id: e9097a5036371a8e6860031012a10732
    entity_id: 193ace087037d45be7348faf0ca76708
    domain: binary_sensor
    trigger: device
    id: Opened
  - alias: Master bedroom door closed
    type: not_opened
    device_id: e9097a5036371a8e6860031012a10732
    entity_id: 193ace087037d45be7348faf0ca76708
    domain: binary_sensor
    trigger: device
    id: Closed
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.master_bedroom_door_light_timer
    id: Timer Finished
  - trigger: state
    entity_id:
    - binary_sensor.driveway_motion_sensor_motion_detection
    from: 'off'
    to: 'on'
    id: Detected
  - trigger: state
    entity_id:
    - binary_sensor.driveway_motion_sensor_motion_detection
    from: 'on'
    to: 'off'
    id: clear
  conditions:
  - condition: sun
    before: sunrise
    after: sunset
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Opened
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          transition: 1.5
          kelvin: 6500
          brightness_pct: 100
        target:
          entity_id:
          - light.garage_side_flood_lights_new
          - light.light_hue_back_driveway
          device_id: 1cd31e07ca48e1a777c772ec4abfad9c
      - action: timer.cancel
        metadata: {}
        data: {}
        target:
          entity_id: timer.master_bedroom_door_light_timer
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Closed
        - condition: trigger
          id:
          - clear
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.master_bedroom_door_light_timer
    - conditions:
      - condition: trigger
        id:
        - Timer Finished
      sequence:
      - action: light.turn_off
        metadata: {}
        data:
          transition: 1
        target:
          entity_id:
          - light.garage_side_flood_lights_new
          - light.light_hue_back_driveway
          device_id: 1cd31e07ca48e1a777c772ec4abfad9c
    - conditions:
      - condition: trigger
        id:
        - clear
      sequence:
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id: timer.master_bedroom_door_light_timer
  mode: single
