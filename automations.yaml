- id: record_scene_master_janet_manual_on
  alias: 'RECORD/SCENE: Master/Janet manual ON (voice or switch)'
  description: 'Records manual/voice ON time and reapplies the proper master bedroom
    light scene even if the light was already ON. Ignores duplicate triggers within
    cooldown.

    '
  triggers:
  - trigger: state
    id: state_on
    entity_id:
    - light.master_bedroom_light_z2m_group
    - light.janest_light_z2m_group
    to: 'on'
  - trigger: event
    id: alexa_on
    event_type: call_service
    event_data:
      domain: light
      service: turn_on
  conditions:
  - condition: template
    value_template: '{% set lt = this.attributes.last_triggered %} {{ lt is none or
      (as_timestamp(now()) - as_timestamp(lt)) > cooldown_seconds }}'
  - condition: or
    conditions:
    - condition: template
      value_template: '{{ trigger.id == ''state_on'' }}'
    - condition: and
      conditions:
      - condition: template
        value_template: "{{ trigger.id == 'alexa_on'\n   and trigger.event.context.user_id
          == secrets.alexa_user_id }}"
      - condition: template
        value_template: "{% set sd = trigger.event.data.service_data or {} %} {% set
          ents = sd.entity_id if sd.entity_id is string else (sd.entity_id or [])
          %} {% set targets = [\n  'light.master_bedroom_light_z2m_group',\n  'light.janest_light_z2m_group'\n]
          %} {{ (ents is string and ents in targets)\n   or (ents is iterable and
          (ents | select('in', targets) | list | count > 0)) }}"
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.master_or_janet_last_manual_on
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - variables:
      mod: '{{ now().hour * 60 + now().minute }}'
      desired_scene: "{% if 960 <= mod <= 1349 %}\n  scene.master_light_hue_4pm_1030pm\n{%
        elif 1350 <= mod <= 1439 %}\n  scene.master_light_hue_1030pm_12am\n{% elif
        0 <= mod <= 329 %}\n  scene.master_light_hue_12am_530am\n{% elif 330 <= mod
        <= 449 %}\n  scene.master_light_hue_530am_730am\n{% else %}\n  scene.master_light_hue_730am_4pm\n{%
        endif %}"
  - choose:
    - conditions:
      - condition: state
        entity_id: light.master_bedroom_light_z2m_group
        state: 'on'
      sequence:
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
      - action: logbook.log
        data:
          name: Master Light
          message: Re-applied {{ desired_scene }} (already ON, guard).
    - conditions:
      - condition: state
        entity_id: light.master_bedroom_light_z2m_group
        state: 'off'
      sequence:
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
      - action: logbook.log
        data:
          name: Master Light
          message: Manual/voice ON → {{ desired_scene }} (mod={{ mod }})
  mode: restart
  variables:
    cooldown_seconds: 5
- id: keep_alive_office_ceiling_fan_tuya_local
  alias: 'KEEP ALIVE: Office Ceiling Fan (Tuya Local)'
  description: ''
  triggers:
  - trigger: time_pattern
    minutes: /10
  conditions:
  - condition: state
    entity_id: input_boolean.tuya_fan_keepalive_enabled
    state: 'on'
  actions:
  - variables:
      light_ent: light.office_ceiling_fan_new
      fan_ent: fan.office_ceiling_fan_new
      light_on: '{{ is_state(light_ent,''on'') }}'
      fan_state: '{{ states(fan_ent) }}'
      fan_on: '{{ fan_state not in [''off'',''unavailable'',''unknown''] }}'
      current_pct: '{% set p = state_attr(fan_ent,''percentage'') %} {{ p if p is
        number else 0 }}

        '
      bri: '{% set b = state_attr(light_ent,''brightness'') %} {{ b if b is number
        else 255 }}

        '
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ light_on }}'
      sequence:
      - action: logbook.log
        data:
          name: Tuya Keep-Alive
          message: Ping via LIGHT (re-send brightness={{ bri }}).
      - action: light.turn_on
        target:
          entity_id: '{{ light_ent }}'
        data:
          brightness: '{{ bri }}'
          transition: 0
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ bri >= 2 and bri <= 254 }}'
          sequence:
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness_step: 1
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness_step: -1
        - conditions:
          - condition: template
            value_template: '{{ bri == 1 }}'
          sequence:
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness: 2
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness: 1
        - conditions:
          - condition: template
            value_template: '{{ bri >= 255 }}'
          sequence:
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness: 254
          - delay: 00:00:01
          - action: light.turn_on
            target:
              entity_id: '{{ light_ent }}'
            data:
              brightness: 255
    - conditions:
      - condition: template
        value_template: '{{ not light_on and fan_on and current_pct|int > 0 }}'
      sequence:
      - action: logbook.log
        data:
          name: Tuya Keep-Alive
          message: Ping via FAN (re-send {{ current_pct }}%).
      - action: fan.set_percentage
        target:
          entity_id: '{{ fan_ent }}'
        data:
          percentage: '{{ current_pct }}'
  - action: logbook.log
    data:
      name: Tuya Keep-Alive
      message: Both off → refresh entities.
  - action: homeassistant.update_entity
    target:
      entity_id:
      - '{{ light_ent }}'
      - '{{ fan_ent }}'
  mode: single
- id: '1761098019103'
  alias: 'LIGHT CONTROL: Front Yard Under Eave Lights (streamlined)'
  description: ''
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: sunset_minus_30
  - trigger: time
    at: 05:00:00
    id: five_am
  - trigger: state
    entity_id: person.edward_steele
    to: home
    id: arrived_home
  - trigger: time
    at: '22:19:30'
    id: now
  actions:
  - variables:
      theme: '{% if is_state(''binary_sensor.holiday_new_years_window'',''on'') %}
        new_years {% elif is_state(''binary_sensor.holiday_valentines_window'',''on'')
        %} valentines {% elif is_state(''binary_sensor.holiday_easter_window'',''on'')
        %} easter {% elif is_state(''binary_sensor.holiday_mothers_day_window'',''on'')
        %} mothers {% elif is_state(''binary_sensor.holiday_fathers_day_window'',''on'')
        %} fathers {% elif is_state(''binary_sensor.holiday_juneteenth_window'',''on'')
        %} juneteenth {% elif is_state(''binary_sensor.holiday_july4_window'',''on'')
        %} july4 {% elif is_state(''binary_sensor.holiday_stpat_window'',''on'') %}
        stpat {% elif is_state(''binary_sensor.holiday_halloween_window'',''on'')
        %} halloween {% elif is_state(''binary_sensor.holiday_thanksgiving_window'',''on'')
        %} thanksgiving {% elif is_state(''binary_sensor.holiday_christmas_window'',''on'')
        %} christmas {% elif is_state(''binary_sensor.season_winter_window'',''on'')
        %} winter {% elif is_state(''binary_sensor.season_spring_window'',''on'')
        %} spring {% elif is_state(''binary_sensor.season_summer_window'',''on'')
        %} summer {% else %} fall {% endif %}'
      scene_entity: "{% set map = {\n  'new_years': 'scene.front_yard_eaves_lights_new_years',\n
        \ 'valentines': 'scene.front_yard_eave_lights_valentines_day',\n  'easter':
        'scene.front_yard_eave_lights_easter',\n  'mothers': 'scene.front_yard_eave_lights_mothers_day',\n
        \ 'fathers': 'scene.front_yard_eave_lights_fathers_day',\n  'juneteenth':
        'scene.front_yard_eave_lights_thanksgiving',\n  'july4': 'scene.front_yard_eave_lights_july_4',\n
        \ 'stpat': 'scene.front_yard_eave_lights_st_pats_day',\n  'halloween': 'scene.front_yard_eave_lights_halloween2',\n
        \ 'thanksgiving': 'scene.front_yard_eave_lights_thanksgiving',\n  'christmas':
        'scene.twinkle_fox_c9_front_yard_eave_lights',\n  'winter': 'scene.front_yard_eave_lights_white_60',\n
        \ 'spring': 'scene.front_yard_eave_lights_white_60',\n  'summer': 'scene.front_yard_eave_lights_white_60',\n
        \ 'fall': 'scene.front_yard_eave_lights_white_60'\n} %} {{ map.get(theme,
        'scene.front_yard_eave_lights_white_60') }}"
  - action: logbook.log
    data:
      name: Front Eaves
      message: Fired. trigger={{ trigger.id | default('manual') }} theme={{ theme
        }} scene={{ scene_entity }}
  - choose:
    - conditions:
      - condition: trigger
        id: sunset_minus_30
        enabled: true
      - condition: trigger
        id:
        - now
        enabled: false
      sequence:
      - action: scene.turn_on
        data:
          entity_id: '{{ scene_entity }}'
      - action: logbook.log
        data:
          name: Front Eaves
          message: sunset-30 → theme={{ theme }}, applied {{ scene_entity }}
    - conditions:
      - condition: trigger
        id: five_am
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.wled_front_under_eave
      - action: logbook.log
        data:
          name: Front Eaves
          message: 05:00 → WLED OFF
    - conditions:
      - condition: trigger
        id: arrived_home
      - condition: time
        after: '22:00:00'
        before: 05:00:00
      sequence:
      - action: scene.create
        data:
          scene_id: late_arrival_front_eaves_snapshot
          snapshot_entities:
          - light.wled_front_under_eave
      - action: scene.turn_on
        target:
          entity_id: scene.front_yard_eave_lights_white_60
        data: {}
      - wait_for_trigger:
        - trigger: state
          entity_id: lock.aqara_smart_lock_u400_living_room
          from: locked
          to: unlocked
        timeout: 00:05:00
        continue_on_timeout: false
      - delay: 00:00:20
      - action: scene.turn_on
        target:
          entity_id: scene.late_arrival_front_eaves_snapshot
      - action: logbook.log
        data:
          name: Front Eaves
          message: Late arrival flow completed; restored snapshot.
  mode: single
- id: '1761463966533'
  alias: 'LIGHT CONTROL: Night light (streamlined, debugged)'
  description: 'Night light only from motion; arrival flow 00:30–05:30 (home → unlock
    ≤5 min). Backlight red only when TV paused/off. Adds debug logs.

    '
  triggers:
  - trigger: state
    entity_id: binary_sensor.sensors_night_motion
    to: 'on'
    id: motion_on
  - trigger: state
    entity_id: binary_sensor.sensors_night_motion
    to: 'off'
    id: motion_off
  - trigger: state
    entity_id: person.edward_steele
    to: home
    id: arrived_home
  - trigger: time
    at: 04:59:59
    id: cutoff_053001
  conditions:
  - condition: time
    after: '23:00:00'
    before: 05:00:00
  actions:
  - action: logbook.log
    data:
      name: Night Light
      message: Trigger={{ trigger.id }} tv_state={{ tv_state }} desired_scene_motion={{
        desired_scene_motion }}
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room_hue_lights_group
          - light.dining_room_lights_z2m_group
        data: {}
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene_motion }}'
          transition: 1.5
      - action: logbook.log
        data:
          name: Night Light
          message: Applied {{ desired_scene_motion }} due to motion.
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.sensors_night_motion
          to: 'on'
        timeout: 00:00:{{ off_delay_seconds | int }}
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ wait.completed == true }}'
          sequence:
          - action: logbook.log
            data:
              name: Night Light
              message: Motion returned during {{ off_delay_seconds }}s; keep ON.
        - conditions:
          - condition: template
            value_template: '{{ wait.completed == false }}'
          sequence:
          - action: scene.turn_on
            data:
              entity_id: '{{ off_scene_motion }}'
              transition: 1.5
          - action: logbook.log
            data:
              name: Night Light
              message: No motion for {{ off_delay_seconds }}s → {{ off_scene_motion
                }}.
    - conditions:
      - condition: trigger
        id: arrived_home
      - condition: time
        after: 00:30:00
        before: 05:30:00
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room_hue_lights_group
          - light.dining_room_lights_z2m_group
      - wait_for_trigger:
        - trigger: state
          entity_id: lock.aqara_smart_lock_u400_living_room
          from: locked
          to: unlocked
        timeout: 00:05:00
        continue_on_timeout: false
      - action: scene.turn_on
        data:
          entity_id: scene.night_light_tv
          transition: 2
      - action: logbook.log
        data:
          name: Night Light
          message: 'Arrival: unlocked within 5 min → scene.night_light_tv'
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.sensors_night_motion
          to: 'off'
          for: 00:01:00
        timeout: '24:00:00'
        continue_on_timeout: false
      - action: scene.turn_on
        data:
          entity_id: scene.night_light_off
          transition: 1.5
      - action: logbook.log
        data:
          name: Night Light
          message: 'Arrival branch: motion cleared 1 min → scene.night_light_off.'
    - conditions:
      - condition: trigger
        id: cutoff_053001
      sequence:
      - action: scene.turn_on
        data:
          entity_id: scene.night_light_off
      - action: logbook.log
        data:
          name: Night Light
          message: Cutoff hit (05:29:59) → scene.night_light_off.
  mode: restart
  variables:
    off_delay_seconds: 90
    tv_state: '{{ states(''media_player.lg_webos_tv_livingroom'') }}'
    tv_playing: '{{ tv_state == ''playing'' }}'
    desired_scene_motion: "{% if tv_playing %}\n  scene.night_light_tv_on\n{% else
      %}\n  scene.night_light_tv\n{% endif %}"
    off_scene_motion: "{% if tv_playing %}\n  scene.night_light_off_tv_on\n{% else
      %}\n  scene.night_light_off\n{% endif %}"
- id: '1761929583363'
  alias: 'LIGHT CONTROL: Master Bedroom (streamlined w/scenes & door)'
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.master_light_occupancy
    to: 'on'
    id: occ_on
  - trigger: state
    entity_id: binary_sensor.master_light_occupancy
    to: 'off'
    id: occ_off
  - trigger: state
    entity_id:
    - binary_sensor.master_bedroom_door_opened
    from:
    - 'off'
    to:
    - 'on'
    id: door_open
  - trigger: time_pattern
    minutes: /1
    id: tick
  - trigger: homeassistant
    event: start
    id: ha_start
  conditions:
  - condition: time
    after: 09:00:00
    before: '23:00:00'
  - condition: state
    entity_id: binary_sensor.eddie_in_bed
    state: 'off'
    for: 00:01:00
    enabled: true
  - condition: state
    entity_id: binary_sensor.janet_in_bed
    state: 'off'
    for: 00:01:00
    enabled: true
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: occ_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 16:00–22:59 => 960–1379 #} {% if 960 <= mod <= 1379 %}\n
            \ scene.master_light_hue_4pm_1030pm\n{# 23:00–23:59 => 1380–1439 #} {%
            elif 1380 <= mod <= 1439 %}\n  scene.master_light_hue_1030pm_12am\n{#
            00:00–05:29 =>   0–329 #} {% elif 0 <= mod <= 329 %}\n  scene.master_light_hue_12am_530am\n{#
            05:30–07:29 => 330–449 #} {% elif 330 <= mod <= 449 %}\n  scene.master_light_hue_530am_730am\n{#
            07:30–15:59 => 450–959  #} {% elif 450 <= mod <= 959 %}\n  scene.master_light_hue_730am_4pm\n{#
            Fallback #} {% else %}\n  scene.master_light_hue_4pm_1030pm\n{% endif
            %}"
      - action: scene.turn_on
        data:
          transition: 2
        target:
          entity_id: '{{ desired_scene }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.master_bedroom_off_at
        data:
          datetime: '1970-01-01 00:00:00'
    - conditions:
      - condition: trigger
        id: door_open
      - condition: state
        entity_id: binary_sensor.master_light_occupancy
        state: 'off'
      - condition: state
        entity_id: binary_sensor.closet_motion_sensors_group
        state: 'off'
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 16:00–22:59 => 960–1379 #} {% if 960 <= mod <= 1379 %}\n
            \ scene.master_light_hue_4pm_1030pm\n{# 23:00–23:59 => 1380–1439 #} {%
            elif 1380 <= mod <= 1439 %}\n  scene.master_light_hue_1030pm_12am\n{#
            00:00–05:29 =>   0–329 #} {% elif 0 <= mod <= 329 %}\n  scene.master_light_hue_12am_530am\n{#
            05:30–07:29 => 330–449 #} {% elif 330 <= mod <= 449 %}\n  scene.master_light_hue_530am_730am\n{#
            07:30–15:59 => 450–959  #} {% elif 450 <= mod <= 959 %}\n  scene.master_light_hue_730am_4pm\n{#
            Fallback #} {% else %}\n  scene.master_light_hue_4pm_1030pm\n{% endif
            %}"
      - action: scene.turn_on
        data:
          transition: 2
        target:
          entity_id: '{{ desired_scene }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.master_bedroom_off_at
        data:
          datetime: '1970-01-01 00:00:00'
    - conditions:
      - condition: trigger
        id: occ_off
      sequence:
      - variables:
          off_at: "{{ (now() + timedelta(minutes=off_delay_minutes))\n   .strftime('%Y-%m-%d
            %H:%M:%S') }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.master_bedroom_off_at
        data:
          datetime: '{{ off_at }}'
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: tick
        - condition: trigger
          id: ha_start
      sequence:
      - variables:
          off_at_str: '{{ states(''input_datetime.master_bedroom_off_at'') }}'
          off_at_ts: "{% if off_at_str not in ['unknown','unavailable','1970-01-01
            00:00:00'] %}\n  {{ as_timestamp(strptime(off_at_str, '%Y-%m-%d %H:%M:%S'))
            }}\n{% else %}\n  {{ none }}\n{% endif %}"
      - condition: template
        value_template: "{{ off_at_ts is not none\n   and as_timestamp(now()) >= off_at_ts\n
          \  and is_state('binary_sensor.master_light_occupancy','off') }}"
      - action: scene.turn_on
        data:
          transition: 1
        target:
          entity_id:
          - scene.master_off
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.master_bedroom_off_at
        data:
          datetime: '1970-01-01 00:00:00'
  mode: restart
  variables:
    off_delay_minutes: 1
