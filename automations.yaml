            after: '20:01:00'
            before: '23:59:59'
            weekday:
            - sat
            - fri
            - thu
            - wed
            - tue
            - mon
            - sun
          sequence:
          - action: script.turn_on
            metadata: {}
            data: {}
            target:
              entity_id: script.media_players_50
      - action: timer.start
        metadata: {}
        data: {}
        target:
          entity_id:
          - timer.announcement_repeat_laundry
      - action: notify.alexa_media
        data:
          target:
          - media_player.echo_dot_kitchen
          - media_player.echo_dot_max_living_room_left
          - media_player.echo_dot_max_master_bedroom
          - media_player.echo_dot_office
          - media_player.echo_dot_adu
          data:
            type: tts
          message: 'Washing Cycle Is Complete

            '
      - if:
        - condition: time
          after: 07:00:00
          before: '20:00:00'
          weekday:
          - sat
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
        then:
        - action: notify.alexa_media
          data:
            target:
            - media_player.echo_dot_adu
            data:
              type: tts
            message: 'Washing Cycle Is Complete

              '
