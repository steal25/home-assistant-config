- id: '1758489860692'
  alias: 'LIGHT CONTROL: Closet (streamlined)'
  description: Motion-activated closet lights with time/bed-aware scenes
  triggers:
  - id: motion_on
    alias: Motion detected
    entity_id: binary_sensor.closet_motion_sensors_group
    from: 'off'
    to: 'on'
    trigger: state
  - id: motion_off
    alias: Motion cleared
    entity_id: binary_sensor.closet_motion_sensors_group
    from: 'on'
    to: 'off'
    trigger: state
  - id: timer_done
    alias: Timer finished
    event_type: timer.finished
    event_data:
      entity_id: timer.closet_light_timer
    trigger: event
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: person.edward_steele
      state: home
    - condition: state
      entity_id: person.janet_steele
      state: home
    - condition: state
      entity_id: person.timmy_steele
      state: home
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''motion_off'' }}'
      sequence:
      - target:
          entity_id: timer.closet_light_timer
        data:
          duration: '10'
        action: timer.start
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''motion_on'' }}'
      sequence:
      - target:
          entity_id: timer.closet_light_timer
        action: timer.cancel
      - target:
          entity_id: '{{ scene_entity }}'
        data:
          transition: 1.5
        action: scene.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''timer_done'' }}'
      sequence:
      - target:
          entity_id:
          - light.hue_closet_1
          - light.hue_closet_2
          - light.hue_closet_3
        data:
          transition: 1.5
        action: light.turn_off
  mode: restart
  variables:
    now_str: '{{ now().strftime(''%H:%M:%S'') }}'
    sleeping: "{{ is_state('binary_sensor.eddie_in_bed','on')\n   or is_state('binary_sensor.janet_in_bed','on')
      }}\n"
    scene_entity: "{% set t = now().strftime('%H:%M:%S') %} {% if '22:30:01' <= t
      <= '23:59:59' %}\n  scene.closet_1030_12\n{% elif '00:00:00' <= t < '02:00:00'
      %}\n  scene.closet_12_530\n{% elif '02:00:01' <= t <= '11:59:59' %}\n  {{ 'scene.closet_530_730_janet_in_bed'
      if sleeping else 'scene.closet_530_730_janet_not_in_bed' }}\n{% elif '12:00:00'
      <= t <= '16:00:00' %}\n  scene.closet730am_4pm\n{% elif '16:00:01' <= t <= '22:30:00'
      %}\n  scene.closet_4_1030\n{% else %}\n  scene.closet_4_1030\n{% endif %}\n"
