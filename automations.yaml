    entity_id:
    - binary_sensor.laundry_door_sensor
    from: 'on'
    to: 'off'
    id: Door Closed
  - trigger: state
    entity_id:
    - binary_sensor.laundry_door_sensor
    from: 'off'
    to: 'on'
    id: Door Opened
  - trigger: state
    entity_id:
    - sensor.dryer_current_status
    to: end
    id: Drying
  - trigger: state
    entity_id:
    - sensor.front_load_washer_current_status
    to: end
    id: Washing
  - trigger: state
    entity_id:
    - sensor.dryer_current_status
    to: power_off
    id: Dryer Power
  - trigger: state
    entity_id:
    - sensor.front_load_washer_current_status
    to: power_off
    id: 'Washer Power '
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - Washing
        - condition: trigger
          id:
          - 'Washer Power '
      sequence:
      - alias: Set Volume
        choose:
        - conditions:
          - condition: time
            after: 00:00:01
            before: '11:00:00'
            weekday:
            - sun
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
          sequence:
          - if:
            - condition: state
              entity_id: binary_sensor.eddie_in_bed
              state: 'on'
            - condition: state
              entity_id: light.master_bedroom_light_z2m_group
              state: 'off'
            then:
            - action: script.turn_on
              metadata: {}
              data: {}
              target:
                entity_id: script.media_players_50_before_11_eddie_in_bed
            else:
            - action: script.turn_on
              metadata: {}
              data: {}
              target:
                entity_id: script.media_players_50_before_11
