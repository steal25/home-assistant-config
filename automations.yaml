- id: '1774494094234'
  alias: 'LIGHT CONTROL: Watch Living Room TV (streamlined)'
  description: ''
  triggers:
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    to: playing
    id: roku_playing
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    to: paused
    id: roku_paused
  - trigger: state
    entity_id: media_player.roku_ultra_2024_living_room
    to:
    - idle
    - 'off'
    id: roku_stopped
  - trigger: state
    entity_id: media_player.lg_webos_tv_livingroom
    to:
    - 'on'
    - 'off'
    id: tv_power
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: sunset_window
  - trigger: homeassistant
    event: start
    id: ha_start
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:30:00
  - condition: time
    before: '23:59:00'
  actions:
  - variables:
      tv_state: '{{ states(''media_player.lg_webos_tv_livingroom'') }}'
      roku_state: '{{ states(''media_player.roku_ultra_2024_living_room'') }}'
      couch_occupied: "{{\n  is_state('binary_sensor.couch_corner_occupied_group',
        'on')\n  or is_state('binary_sensor.couch_eddie_occupied_group', 'on')\n  or
        is_state('binary_sensor.couch_janet_occupied_group', 'on')\n}}\n"
      desired_scene: "{% if tv_state == 'off' %}\n  scene.emby_stopped\n{% elif roku_state
        == 'playing' %}\n  scene.emby_playing\n{% elif roku_state == 'paused' %}\n
        \ scene.emby_paused\n{% else %}\n  scene.emby_stopped\n{% endif %}\n"
      transition_secs: "{% if desired_scene == 'scene.emby_playing' %}\n  {{ 1.0 if
        is_state('input_boolean.emby_recently_dimmed','on') else 1.5 }}\n{% elif desired_scene
        == 'scene.emby_paused' %}\n  2\n{% else %}\n  1.5\n{% endif %}\n"
  - choose:
    - conditions:
      - condition: trigger
        id: roku_paused
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ couch_occupied }}'
          sequence:
          - wait_for_trigger:
            - trigger: state
              entity_id: media_player.roku_ultra_2024_living_room
              to: playing
            timeout: 00:00:15
            continue_on_timeout: true
          - choose:
            - conditions:
              - condition: state
                entity_id: media_player.roku_ultra_2024_living_room
                state: paused
              sequence:
              - action: scene.turn_on
                data:
                  entity_id: scene.emby_paused
                  transition: 2
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.emby_recently_dimmed
            - conditions:
              - condition: state
                entity_id: media_player.roku_ultra_2024_living_room
                state: playing
              sequence:
              - action: scene.turn_on
                data:
                  entity_id: scene.emby_playing
                  transition: '{{ 1.0 if is_state(''input_boolean.emby_recently_dimmed'',''on'')
                    else 1.5 }}

                    '
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.emby_recently_dimmed
        default:
        - action: scene.turn_on
          data:
            entity_id: scene.emby_paused
            transition: 2
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.emby_recently_dimmed
    default:
    - action: scene.turn_on
      data:
        entity_id: '{{ desired_scene }}'
        transition: '{{ transition_secs | float }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ desired_scene == ''scene.emby_playing'' }}'
        sequence:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.emby_recently_dimmed
  mode: restart
- id: '1774540890474'
  alias: 'SPRINKLERS: Backyard (weather smart 2)'
  description: ''
  triggers:
  - trigger: time
    at: 00:00:00
  - trigger: time
    at: 06:00:00
  conditions: []
  actions:
  - variables:
      base_minutes: '{{ states(''input_number.sprinklers_back_minutes'') | int(6)
        }}'
      frequency: '{{ states(''input_select.sprinklers_back_frequency'') }}'
      anchor_date: '{{ states(''input_datetime.sprinklers_back_anchor'') }}'
      look_ahead_hours: 12
      rain_prob_threshold: 60
      rain_amount_threshold_mm: 1.5
      wind_threshold_mph: 20
      freeze_threshold_c: 2
      wx_entity: weather.big_home
      s_prob: sensor.pirateweather_precip_probability
      s_intensity: sensor.pirateweather_precip_intensity
      s_temp_c: sensor.pirateweather_temperature
      s_wind_mph: sensor.pirateweather_wind_speed
      s_gust_mph: sensor.pirateweather_wind_gust
  - variables:
      days_since_anchor: '{% set a = strptime(anchor_date, ''%Y-%m-%d'') if anchor_date
        not in [''unknown'',''unavailable'','''',''none''] else now() %} {{ (now().date()
        - a.date()).days }}'
      run_today: "{% if frequency == 'Off' %}\n  false\n{% elif frequency == 'Every
        day' %}\n  true\n{% elif frequency == 'Every other day' %}\n  {{ (days_since_anchor
        | int(0)) % 2 == 0 }}\n{% elif frequency == 'Every third day' %}\n  {{ (days_since_anchor
        | int(0)) % 3 == 0 }}\n{% elif frequency == 'Mon Wed Fri' %}\n  {{ now().weekday()
        in [0, 2, 4] }}\n{% elif frequency == 'Tue Thu Sat' %}\n  {{ now().weekday()
        in [1, 3, 5] }}\n{% else %}\n  true\n{% endif %}"
      season_factor: "{% if is_state('binary_sensor.season_summer_window','on') %}\n
        \ 1.30\n{% elif is_state('binary_sensor.season_spring_window','on') %}\n  1.10\n{%
        elif is_state('binary_sensor.season_fall_window','on') %}\n  1.00\n{% else
        %}\n  0.80\n{% endif %}"
      run_minutes: '{{ ((base_minutes | default(6) | int) * (season_factor | float))
        | round(0) | int }}'
  - action: weather.get_forecasts
    data:
      entity_id: '{{ wx_entity }}'
      type: hourly
    response_variable: wxresp
  - variables:
      fc_list: '{{ (wxresp[wx_entity].forecast if wxresp and wxresp.get(wx_entity)
        else []) }}'
      now_ts: '{{ as_timestamp(now()) }}'
      cutoff_ts: '{{ now_ts + (look_ahead_hours | int) * 3600 }}'
      cur_prob: '{{ states(s_prob) | float(0) }}'
      cur_intensity_mmph: '{{ states(s_intensity) | float(0) }}'
      cur_temp_c: '{{ states(s_temp_c) | float(0) }}'
      cur_wind_mph: '{{ states(s_wind_mph) | float(0) }}'
      cur_gust_mph: '{{ states(s_gust_mph) | float(0) }}'
      wind_now: '{{ [cur_wind_mph | float(0), cur_gust_mph | float(0)] | max }}'
      rainy_now: '{{ (cur_intensity_mmph | float(0)) > 0 or (cur_prob | float(0))
        >= (rain_prob_threshold | float(0)) }}'
      prob_skip: "{% set hit = false %}\n{% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set p = (it.get('precipitation_probability',
        0) | float(0)) %}\n      {% if p >= (rain_prob_threshold | float(0)) %}\n
        \       {% set hit = true %}\n      {% endif %}\n    {% endif %}\n  {% endif
        %}\n{% endfor %}\n{{ hit }}"
      amount_skip: "{% set total = 0.0 %}\n{% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set mm = (it.get('precipitation',
        0) | float(0)) %}\n      {% set total = total + mm %}\n    {% endif %}\n  {%
        endif %}\n{% endfor %}\n{{ total >= (rain_amount_threshold_mm | float(0))
        }}"
      wind_skip: '{{ (wind_now | float(0)) >= (wind_threshold_mph | float(0)) }}'
      freeze_skip: '{{ (cur_temp_c | float(0)) <= (freeze_threshold_c | float(0))
        }}'
      should_skip: "{{ (not (run_today | bool)\n    or rainy_now or prob_skip or amount_skip
        or wind_skip or freeze_skip)\n   and not is_state('input_boolean.water_anyway','on')
        }}"
      backyard_zones:
      - valve.backyard_zone_1
      - valve.backyard_zone_2
      - valve.backyard_zone_3
  - action: logbook.log
    data:
      name: Sprinklers (Backyard)
      message: 'freq={{ frequency }}, run_today={{ run_today }}, run={{ run_minutes
        }}m | now: prob={{ cur_prob }}%, rain={{ cur_intensity_mmph }}mm/h, temp={{
        cur_temp_c }}°C, wind={{ wind_now }} mph | skip={{ should_skip }} (sched={{
        not (run_today | bool) }}, now={{ rainy_now }}, prob={{ prob_skip }}, amount={{
        amount_skip }}, wind={{ wind_skip }}, freeze={{ freeze_skip }}) | override={{
        is_state(''input_boolean.water_anyway'',''on'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ should_skip | bool }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.sprinklers_back_skipped_last
      - action: input_text.set_value
        target:
          entity_id: input_text.sprinklers_back_last_reason
        data:
          value: 'Skipped: run_today={{ run_today }}, rainy_now={{ rainy_now }}, prob={{
            prob_skip }}, amount={{ amount_skip }}, wind={{ wind_skip }}, freeze={{
            freeze_skip }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sprinklers_back_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: persistent_notification.create
        data:
          title: Backyard sprinklers skipped
          message: 'Skipped due to schedule/weather: run_today={{ run_today }}, rainy_now={{
            rainy_now }}, prob={{ prob_skip }}, precip_total={{ amount_skip }}, wind={{
            wind_skip }}, freeze={{ freeze_skip }}. Override={{ states(''input_boolean.water_anyway'')
            }}'
    - conditions:
      - condition: template
        value_template: '{{ not (should_skip | bool) }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinklers_back_skipped_last
      - action: input_text.set_value
        target:
          entity_id: input_text.sprinklers_back_last_reason
        data:
          value: Ran backyard zones sequentially ({{ run_minutes }} min each)
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sprinklers_back_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - repeat:
          for_each: '{{ backyard_zones }}'
          sequence:
          - action: valve.open_valve
            target:
              entity_id: '{{ repeat.item }}'
          - delay: 00:{{ run_minutes }}:00
          - action: valve.close_valve
            target:
              entity_id: '{{ repeat.item }}'
  mode: queued
  max: 2
  max_exceeded: silent
- id: '1774541965253'
  alias: 'SPRINKLERS: Frontyard (weather smart 2)'
  description: ''
  triggers:
  - trigger: time
    at: '23:00:00'
  - trigger: time
    at: 05:00:00
  conditions: []
  actions:
  - variables:
      base_minutes: '{{ states(''input_number.sprinklers_front_minutes'') | int(6)
        }}'
      frequency: '{{ states(''input_select.sprinklers_front_frequency'') }}'
      anchor_date: '{{ states(''input_datetime.sprinklers_front_anchor'') }}'
      look_ahead_hours: 12
      rain_prob_threshold: 60
      rain_amount_threshold_mm: 1.5
      wind_threshold_mph: 20
      freeze_threshold_c: 2
      wx_entity: weather.big_home
      s_prob: sensor.pirateweather_precip_probability
      s_intensity: sensor.pirateweather_precip_intensity
      s_temp_c: sensor.pirateweather_temperature
      s_wind_mph: sensor.pirateweather_wind_speed
      s_gust_mph: sensor.pirateweather_wind_gust
  - variables:
      days_since_anchor: '{% set a = strptime(anchor_date, ''%Y-%m-%d'') if anchor_date
        not in [''unknown'',''unavailable'','''',''none''] else now() %} {{ (now().date()
        - a.date()).days }}'
      run_today: "{% if frequency == 'Off' %}\n  false\n{% elif frequency == 'Every
        day' %}\n  true\n{% elif frequency == 'Every other day' %}\n  {{ (days_since_anchor
        | int(0)) % 2 == 0 }}\n{% elif frequency == 'Every third day' %}\n  {{ (days_since_anchor
        | int(0)) % 3 == 0 }}\n{% elif frequency == 'Mon Wed Fri' %}\n  {{ now().weekday()
        in [0, 2, 4] }}\n{% elif frequency == 'Tue Thu Sat' %}\n  {{ now().weekday()
        in [1, 3, 5] }}\n{% else %}\n  true\n{% endif %}"
      season_factor: "{% if is_state('binary_sensor.season_summer_window','on') %}\n
        \ 1.30\n{% elif is_state('binary_sensor.season_spring_window','on') %}\n  1.10\n{%
        elif is_state('binary_sensor.season_fall_window','on') %}\n  1.00\n{% else
        %}\n  0.80\n{% endif %}"
      run_minutes: '{{ ((base_minutes | default(6) | int) * (season_factor | float))
        | round(0) | int }}'
  - action: weather.get_forecasts
    data:
      entity_id: '{{ wx_entity }}'
      type: hourly
    response_variable: wxresp
  - variables:
      fc_list: '{{ (wxresp[wx_entity].forecast if wxresp and wxresp.get(wx_entity)
        else []) }}'
      now_ts: '{{ as_timestamp(now()) }}'
      cutoff_ts: '{{ now_ts + (look_ahead_hours | int) * 3600 }}'
      cur_prob: '{{ states(s_prob) | float(0) }}'
      cur_intensity_mmph: '{{ states(s_intensity) | float(0) }}'
      cur_temp_c: '{{ states(s_temp_c) | float(0) }}'
      cur_wind_mph: '{{ states(s_wind_mph) | float(0) }}'
      cur_gust_mph: '{{ states(s_gust_mph) | float(0) }}'
      wind_now: '{{ [cur_wind_mph | float(0), cur_gust_mph | float(0)] | max }}'
      rainy_now: '{{ (cur_intensity_mmph | float(0)) > 0 or (cur_prob | float(0))
        >= (rain_prob_threshold | float(0)) }}'
      prob_skip: "{% set hit = false %}\n{% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set p = (it.get('precipitation_probability',
        0) | float(0)) %}\n      {% if p >= (rain_prob_threshold | float(0)) %}\n
        \       {% set hit = true %}\n      {% endif %}\n    {% endif %}\n  {% endif
        %}\n{% endfor %}\n{{ hit }}"
      amount_skip: "{% set total = 0.0 %}\n{% for it in (fc_list or []) %}\n  {% set
        dt = it.get('datetime') %}\n  {% if dt %}\n    {% set ts = as_timestamp(dt)
        %}\n    {% if ts is number and ts <= cutoff_ts %}\n      {% set mm = (it.get('precipitation',
        0) | float(0)) %}\n      {% set total = total + mm %}\n    {% endif %}\n  {%
        endif %}\n{% endfor %}\n{{ total >= (rain_amount_threshold_mm | float(0))
        }}"
      wind_skip: '{{ (wind_now | float(0)) >= (wind_threshold_mph | float(0)) }}'
      freeze_skip: '{{ (cur_temp_c | float(0)) <= (freeze_threshold_c | float(0))
        }}'
      should_skip: "{{ (not (run_today | bool)\n    or rainy_now or prob_skip or amount_skip
        or wind_skip or freeze_skip)\n   and not is_state('input_boolean.water_anyway','on')
        }}"
  - action: logbook.log
    data:
      name: Sprinklers (Frontyard)
      message: freq={{ frequency }}, run_today={{ run_today }}, run={{ run_minutes
        }}m | skip={{ should_skip }}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ should_skip | bool }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.sprinklers_skipped_last
      - action: input_text.set_value
        target:
          entity_id: input_text.sprinklers_last_reason
        data:
          value: 'Skipped: run_today={{ run_today }}, rainy_now={{ rainy_now }}, prob={{
            prob_skip }}, amount={{ amount_skip }}, wind={{ wind_skip }}, freeze={{
            freeze_skip }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sprinklers_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - conditions:
      - condition: template
        value_template: '{{ not (should_skip | bool) }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinklers_skipped_last
      - action: input_text.set_value
        target:
          entity_id: input_text.sprinklers_last_reason
        data:
          value: Ran zones sequentially ({{ run_minutes }} min each)
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sprinklers_last_action_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: valve.open_valve
        target:
          entity_id: valve.front_yard_zone
      - delay: 00:{{ run_minutes }}:00
      - action: valve.close_valve
        target:
          entity_id: valve.front_yard_zone
      - action: valve.open_valve
        target:
          entity_id: valve.walkway_zone
      - delay: 00:{{ run_minutes }}:00
      - action: valve.close_valve
        target:
          entity_id: valve.walkway_zone
      - action: valve.open_valve
        target:
          entity_id: valve.garden_zone
      - delay: 00:{{ run_minutes }}:00
      - action: valve.close_valve
        target:
          entity_id: valve.garden_zone
  mode: queued
  max: 2
  max_exceeded: silent
