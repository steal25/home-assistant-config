          before: '20:00:00'
          weekday:
          - sat
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
        then:
        - action: notify.alexa_media
          data:
            target:
            - media_player.echo_dot_adu
            data:
              type: tts
            message: 'Drying Cycle Is Complete

              '
      - action: tts.cloud_say
        metadata: {}
        data:
          cache: false
          message: Drying cycle is completed
          entity_id: media_player.living_room_home_pod
      - action: tts.cloud_say
        metadata: {}
        data:
          cache: false
          message: Drying cycle is completed
          entity_id: media_player.office_home_pod
