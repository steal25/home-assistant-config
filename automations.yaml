- *id004
- id: end_of_day_streamlined_with_override
  alias: End Of Day (streamlined)
  description: Close up the house when both are in bed at night; cancel if someone
    gets up or office is occupied; keep master lights on if manually/voice turned
    on within last 10 minutes.
  triggers:
  - trigger: time
    at: '22:30:00'
    id: t_2230
  - trigger: time
    at: 00:00:00
    id: t_0000
  - trigger: time
    at: 03:00:00
    id: t_0300
  - trigger: state
    entity_id: binary_sensor.both_in_bed_2
    to: 'on'
    for: 00:01:00
    id: both_in_bed_on
  - trigger: state
    entity_id: binary_sensor.both_in_bed_2
    to: 'off'
    id: both_in_bed_off
  - trigger: state
    entity_id: binary_sensor.office_occupied
    to: 'on'
    id: office_motion
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.both_in_bed
    id: timer_done
  actions:
  - choose:
    - alias: Start timer when in window & both in bed
      conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: t_2230
        - condition: trigger
          id: t_0000
        - condition: trigger
          id: t_0300
        - condition: trigger
          id: both_in_bed_on
      - condition: template
        value_template: '{{ in_night_window }}'
      - condition: state
        entity_id: binary_sensor.both_in_bed_2
        state: 'on'
      sequence:
      - target:
          entity_id: timer.both_in_bed
        action: timer.start
      - data:
          name: End of Day
          message: Countdown started (both in bed, night window).
          entity_id: timer.both_in_bed
        action: logbook.log
    - alias: Cancel timer when not both in bed
      conditions:
      - condition: trigger
        id: both_in_bed_off
      - condition: template
        value_template: '{{ in_night_window }}'
      sequence:
      - target:
          entity_id: timer.both_in_bed
        action: timer.cancel
      - data:
          name: End of Day
          message: Countdown cancelled (someone got up).
          entity_id: timer.both_in_bed
        action: logbook.log
    - alias: Cancel timer when office is occupied
      conditions:
      - condition: trigger
        id: office_motion
      - condition: template
        value_template: '{{ in_night_window }}'
      sequence:
      - target:
          entity_id: timer.both_in_bed
        action: timer.cancel
      - data:
          name: End of Day
          message: Countdown cancelled (office occupied).
          entity_id: timer.both_in_bed
        action: logbook.log
    - alias: Execute end-of-day actions
      conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - variables:
          _ts: '{{ states(''input_datetime.master_or_janet_last_manual_on'') }}'
          manual_recent: "{% set last = strptime(_ts, '%Y-%m-%d %H:%M:%S') if _ts
            not in ['unknown','unavailable',''] else none %} {% if last is not none
            %}\n  {{ (as_timestamp(now()) - as_timestamp(last)) <= 10*60 }}\n{% else
            %}\n  false\n{% endif %}"
      - if:
        - condition: template
          value_template: '{{ manual_recent }}'
        then:
        - data:
            scene_id: keep_master_janet_on_snapshot
            snapshot_entities:
            - light.master_bedroom_main_switch_top
            - light.master_bedroom_main_switch_bottom
          action: scene.create
      - target:
          entity_id: cover.garage_door_3
        action: cover.close_cover
      - target:
          entity_id: switch.tundra_alarm_new
        action: switch.toggle
      - target:
          entity_id: lock.all_the_locks
        action: lock.lock
      - target:
          entity_id: light.all_the_lights
        action: light.turn_off
      - if:
        - condition: template
          value_template: '{{ manual_recent }}'
        then:
        - target:
            entity_id: scene.keep_master_janet_on_snapshot
          data:
            transition: 0.5
          action: scene.turn_on
      - target:
          entity_id:
          - fan.living_room_ceiling_fan_new
          - fan.office_ceiling_fan_new
        action: fan.turn_off
      - if:
        - condition: state
          entity_id: sensor.adventurer_5m_status
          state: READY
        then:
        - target:
            entity_id:
            - switch.office_power_strip_l3
            - switch.office_power_strip_3d_printer
          action: switch.turn_off
      - if:
        - condition: numeric_state
          entity_id: sensor.garage_radio_power
          above: 9.5
        then:
        - target:
            entity_id: remote.broadlink_rm3_mini
          data:
            device: Radio
            command:
            - Power
            num_repeats: 1
            delay_secs: 0.4
            hold_secs: 0
          action: remote.send_command
  mode: restart
  variables:
    in_night_window: '{% set h = now().hour*60 + now().minute %} {% set start = 22*60
      + 30 %}  {# 22:30 => 1350 #} {% set end   = 5*60 + 30  %}  {# 05:30 => 330  #}
      {{ h >= start or h < end }}'
- *id005
- id: light_control_garage_bathroom_hybrid
  alias: 'LIGHT CONTROL: Garage Bathroom (mmWave group only)'
  description: ON when mmWave motion group turns on; OFF only after the group is clear
    (timer). Restart-safe with timer.
  triggers:
  - trigger: state
    entity_id: binary_sensor.group_garage_bathroom_motion
    to: 'on'
    id: group_on
  - trigger: state
    entity_id: binary_sensor.group_garage_bathroom_motion
    to: 'off'
    id: motion_group_off
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.timer_garage_bathroom_light
    id: timer_done
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: group_on
      sequence:
      - variables:
          mod: '{{ now().hour * 60 + now().minute }}'
          desired_scene: "{# 07:00–09:59 => 420–599 #} {% if 420 <= mod <= 599 %}\n
            \ scene.garage_bathroom_lights_7a_10a_50\n{# 10:00–19:59 => 600–1199 #}
            {% elif 600 <= mod <= 1199 %}\n  scene.garage_bathroom_lights_10a_8p\n{#
            20:00–06:59 (wrap) => night scene #} {% else %}\n  scene.garage_bathroom_lights_8p_7a\n{%
            endif %}"
      - action: logbook.log
        data:
          name: Garage Bath ON
          message: TRIGGER={{ trigger.id }}  mod={{ mod }}  someone_home={{ someone_home
            }}  scene={{ desired_scene }}
      - condition: template
        value_template: '{{ someone_home }}'
      - action: timer.cancel
        target:
          entity_id: timer.timer_garage_bathroom_light
      - action: scene.turn_on
        data:
          entity_id: '{{ desired_scene }}'
          transition: 1
    - conditions:
      - condition: trigger
        id: motion_group_off
      sequence:
      - action: timer.start
        target:
          entity_id: timer.timer_garage_bathroom_light
        data:
          duration: 00:00:{{ off_delay_seconds }}
      - action: logbook.log
        data:
          name: Garage Bath Clear
          message: All sensors clear → timer {{ off_delay_seconds }}s
    - conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.garage_bathroom_double_switch
        data:
          transition: 1
      - action: scene.turn_on
        data:
          entity_id: scene.garage_bathroom_lights_off
          transition: 1
      - action: logbook.log
        data:
          name: Garage Bath Timer
          message: Lights off (timer_done).
  mode: restart
  variables:
    off_delay_seconds: 10
    someone_home: "{{ is_state('person.edward_steele','home')\n   or is_state('person.janet_steele','home')\n
      \  or is_state('person.timmy_steele','home') }}"
- &id006
  id: light_control_master_door_driveway_grouped
  alias: 'LIGHT CONTROL: Master Door/Driveway Lights (grouped, night, auto-off)'
  description: Door/switch ON starts timer. Motion only extends. Smart OFF after door
    close or motion clear.
  triggers:
  - trigger: state
    entity_id: binary_sensor.master_bedroom
    to: 'on'
    id: door_open
  - trigger: state
    entity_id: binary_sensor.master_bedroom
    to: 'off'
    id: door_closed
  - trigger: state
    entity_id: binary_sensor.driveway_motion_sensor_motion_detection
    to: 'on'
    id: motion_on
  - trigger: state
    entity_id: binary_sensor.driveway_motion_sensor_motion_detection
    to: 'off'
    id: motion_off
  - trigger: state
    entity_id:
    - light.garage_door_flood_lights_new
    - light.garage_side_flood_lights_new
    from: 'off'
    to: 'on'
    id: manual_flood_on
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.master_bedroom_door_light_timer
    id: timer_done
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: door_open
      sequence:
      - condition: template
        value_template: '{{ is_night }}'
      - target:
          entity_id: light.backyard_night_lights
        action: light.turn_on
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: '{{ door_close_off_delay }}'
        action: timer.start
      - data:
          name: Driveway Lights
          message: Door opened → group ON, {{ door_close_off_delay }} timer started.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: door_closed
      sequence:
      - condition: template
        value_template: '{{ is_night }}'
      - condition: state
        entity_id: binary_sensor.driveway_motion_sensor_motion_detection
        state: 'off'
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: '{{ door_close_off_delay }}'
        action: timer.start
      - data:
          name: Driveway Lights
          message: Door closed & no motion → start {{ door_close_off_delay }} off
            timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: manual_flood_on
      sequence:
      - condition: template
        value_template: '{{ is_night }}'
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: '{{ door_close_off_delay }}'
        action: timer.start
      - data:
          name: Driveway Lights
          message: Manual flood ON (night) → start/refresh {{ door_close_off_delay
            }} off timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - condition: template
        value_template: '{{ is_night }}'
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        action: timer.cancel
      - data:
          name: Driveway Lights
          message: Motion ON → timer cancelled (extend on-time).
        action: logbook.log
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - condition: template
        value_template: '{{ is_night }}'
      - wait_for_trigger:
        - entity_id: binary_sensor.driveway_motion_sensor_motion_detection
          to: 'on'
          trigger: state
        timeout: '{{ motion_clear_confirm }}'
        continue_on_timeout: true
      - condition: template
        value_template: '{{ wait.completed == false }}'
      - target:
          entity_id: timer.master_bedroom_door_light_timer
        data:
          duration: '{{ motion_clear_off_delay }}'
        action: timer.start
      - data:
          name: Driveway Lights
          message: Motion OFF held {{ motion_clear_confirm }} → start {{ motion_clear_off_delay
            }} off timer.
        action: logbook.log
    - conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - target:
          entity_id: light.backyard_night_lights
        action: light.turn_off
      - data:
          name: Driveway Lights
          message: Timer finished → group OFF.
        action: logbook.log
  mode: restart
  variables:
    door_close_off_delay: 00:05:00
    motion_clear_confirm: 00:01:00
    motion_clear_off_delay: 00:02:00
    is_night: '{{ is_state(''sun.sun'',''below_horizon'') }}'
