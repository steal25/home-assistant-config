- id: '1778129730675'
  alias: 'ANNOUNCEMENT: Laundry Is Finished w/ volume control'
  description: ''
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.announcement_repeat_laundry
    id: Timer Finished
  - trigger: state
    entity_id:
    - binary_sensor.laundry_door_sensor
    from: 'on'
    to: 'off'
    id: Door Closed
  - trigger: state
    entity_id:
    - binary_sensor.laundry_door_sensor
    from: 'off'
    to: 'on'
    id: Door Opened
  - trigger: state
    entity_id:
    - sensor.dryer_current_status
    to: end
    id: Drying
  - trigger: state
    entity_id:
    - sensor.front_load_washer_current_status
    to: end
    id: Washing
  - trigger: state
    entity_id:
    - sensor.dryer_current_status
    to: power_off
    id: Dryer Power
  - trigger: state
    entity_id:
    - sensor.front_load_washer_current_status
    to: power_off
    id: Washer Power
  conditions: []
  actions:
  - choose:
    - alias: When triggered by washing or power off
      conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: Washing
        - condition: trigger
          id: Washer Power
      sequence:
      - alias: Set Volume
        choose:
        - alias: 50% Sleeping
          conditions:
          - condition: time
            after: 00:00:01
            before: '11:00:00'
          sequence:
          - if:
            - condition: state
              entity_id: binary_sensor.eddie_in_bed
              state: 'on'
            - condition: state
              entity_id: light.master_bedroom_light_z2m_group
              state: 'off'
            then:
            - action: script.turn_on
              target:
                entity_id: script.media_players_50_before_11_eddie_in_bed
            else:
            - action: script.turn_on
              target:
                entity_id: script.media_players_50_before_11
        - alias: 60% 11-8
          conditions:
          - condition: time
            after: '11:01:00'
            before: '20:00:00'
          sequence:
          - action: script.turn_on
            target:
              entity_id: script.media_players_60
        - alias: 50% After 8
          conditions:
          - condition: time
            after: '20:01:00'
            before: '23:59:59'
          sequence:
          - action: script.turn_on
            target:
              entity_id: script.media_players_50
      - action: timer.start
        target:
          entity_id: timer.announcement_repeat_laundry
      - action: notify.alexa_media
        data:
          target:
          - media_player.echo_dot_kitchen
          - media_player.echo_dot_max_living_room_left
          - media_player.echo_dot_max_master_bedroom
          - media_player.echo_dot_office
          - media_player.echo_dot_adu
          data:
            type: tts
          message: Washing Cycle Is Complete
      - if:
        - condition: time
          after: 07:00:00
          before: '20:00:00'
        then:
        - action: notify.alexa_media
          data:
            target:
            - media_player.echo_dot_adu
            data:
              type: tts
            message: Washing Cycle Is Complete
      - action: tts.cloud_say
        data:
          cache: false
          entity_id: media_player.living_room_home_pod
          message: Washing cycle is completed
      - action: tts.cloud_say
        data:
          cache: false
          entity_id: media_player.office_home_pod
          message: Washing cycle is completed
      - delay:
          hours: 0
          minutes: 0
          seconds: 8
          milliseconds: 0
      - repeat:
          for_each: '{{ volume_players }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ repeat.item in saved_volumes }}'
            then:
            - action: media_player.volume_set
              data:
                entity_id: '{{ repeat.item }}'
                volume_level: '{{ saved_volumes[repeat.item] }}'
    - alias: When triggered by drying or power off
      conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: Drying
        - condition: trigger
          id: Dryer Power
      sequence:
      - alias: Set Volume
        choose:
        - alias: 50% Sleeping
          conditions:
          - condition: time
            after: 00:01:00
            before: '11:00:00'
          sequence:
          - action: script.turn_on
            target:
              entity_id: script.media_players_50_before_11
        - alias: 60% 11-8
          conditions:
          - condition: time
            after: '11:01:00'
            before: '20:00:00'
          sequence:
          - action: script.turn_on
            target:
              entity_id: script.media_players_60
        - alias: 50% After 8
          conditions:
          - condition: time
            after: '20:01:00'
            before: '23:59:59'
          sequence:
          - action: script.turn_on
            target:
              entity_id: script.media_players_50
      - action: notify.alexa_media
        data:
          target:
          - media_player.echo_dot_kitchen
          - media_player.echo_dot_max_living_room_left
          - media_player.echo_dot_max_master_bedroom
          - media_player.echo_dot_office
          data:
            type: tts
          message: Drying Cycle Is Complete
      - if:
        - condition: time
          after: 07:00:00
          before: '20:00:00'
        then:
        - action: notify.alexa_media
          data:
            target:
            - media_player.echo_dot_adu
            data:
              type: tts
            message: Drying Cycle Is Complete
      - action: tts.cloud_say
        data:
          cache: false
          entity_id: media_player.living_room_home_pod
          message: Drying cycle is completed
      - action: tts.cloud_say
        data:
          cache: false
          entity_id: media_player.office_home_pod
          message: Drying cycle is completed
      - delay: 00:00:08
      - repeat:
          for_each: '{{ volume_players }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ repeat.item in saved_volumes }}'
            then:
            - action: media_player.volume_set
              data:
                entity_id: '{{ repeat.item }}'
                volume_level: '{{ saved_volumes[repeat.item] }}'
    - alias: When triggered by timer finished
      conditions:
      - condition: trigger
        id: Timer Finished
      sequence:
      - action: notify.alexa_media
        data:
          target:
          - media_player.echo_dot_kitchen
          - media_player.echo_dot_max_living_room_left
          - media_player.echo_dot_max_master_bedroom
          - media_player.echo_dot_office
          message: Washing Cycle Is Complete
          data:
            type: tts
      - if:
        - condition: time
          after: 07:00:00
          before: '20:00:00'
        then:
        - action: notify.alexa_media
          data:
            target:
            - media_player.echo_dot_adu
            data:
              type: tts
            message: Washing Cycle Is Complete
      - action: timer.start
        data:
          duration: '300'
        target:
          entity_id: timer.announcement_repeat_laundry
    - alias: When triggered by door opened or closed
      conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: Door Closed
        - condition: trigger
          id: Door Opened
      sequence:
      - action: timer.cancel
        target:
          entity_id: timer.announcement_repeat_laundry
  mode: single
  variables:
    volume_players:
    - media_player.echo_dot_kitchen
    - media_player.echo_dot_max_living_room_left
    - media_player.echo_dot_max_master_bedroom
    - media_player.echo_dot_office
    - media_player.echo_dot_adu
    - media_player.living_room_home_pod
    - media_player.office_home_pod
    saved_volumes: "{% set ns = namespace(v={}) %} {% for p in volume_players %}\n
      \ {% set vol = state_attr(p, 'volume_level') %}\n  {% if vol is number %}\n
      \   {% set ns.v = dict(ns.v, **{p: vol}) %}\n  {% endif %}\n{% endfor %} {{
      ns.v }}\n"
