- id: end_of_day_smart_bed_logic
  alias: End Of Day (smart bed logic)
  description: If Edward home -> both in bed. If Edward away -> only Janet in bed.
    Starts/cancels timer accordingly.
  triggers:
  - trigger: time
    at: '22:30:00'
    id: t_2230
  - trigger: time
    at: 00:00:00
    id: t_0000
  - trigger: time
    at: 03:00:00
    id: t_0300
  - trigger: state
    entity_id: binary_sensor.both_in_bed_2
    id: both_bed_changed
  - trigger: state
    entity_id: binary_sensor.bed_occupancy_sensor_2_bed_occupied_right
    id: janet_bed_changed
  - trigger: state
    entity_id: person.edward_steele
    id: edward_home_changed
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.both_in_bed
    id: timer_done
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id:
          - t_2230
          - t_0000
          - t_0300
          - both_bed_changed
          - janet_bed_changed
          - edward_home_changed
      sequence:
      - if:
        - condition: template
          value_template: '{{ bedtime_ok }}'
        then:
        - target:
            entity_id: timer.both_in_bed
          action: timer.start
        - data:
            name: End Of Day
            message: 'Timer START: ed_home={{ ed_home }}, both_in_bed={{ both_in_bed
              }}, janet_in_bed={{ janet_in_bed }}.'
          action: logbook.log
        else:
        - target:
            entity_id: timer.both_in_bed
          action: timer.cancel
        - data:
            name: End Of Day
            message: 'Timer CANCEL: requirement not met (ed_home={{ ed_home }}, both_in_bed={{
              both_in_bed }}, janet_in_bed={{ janet_in_bed }}).'
          action: logbook.log
    - conditions:
      - condition: trigger
        id: timer_done
      sequence:
      - target:
          entity_id: cover.garage_door_3
        action: cover.close_cover
      - target:
          entity_id:
          - switch.tundra_alarm_new
        action: switch.toggle
      - target:
          entity_id: lock.all_the_locks
        action: lock.lock
      - target:
          entity_id:
          - light.all_the_lights
          - light.hue_lamp
        action: light.turn_off
        data: {}
      - target:
          entity_id:
          - fan.living_room_ceiling_fan_new
          - fan.office_ceiling_fan_new
        action: fan.turn_off
      - if:
        - condition: state
          entity_id: sensor.adventurer_5m_status
          state: READY
        then:
        - target:
            entity_id:
            - switch.office_power_strip_l3
            - switch.office_power_strip_3d_printer
          action: switch.turn_off
      - action: media_player.media_stop
        metadata: {}
        data: {}
        target:
          entity_id: media_player.wiim_mini_garage
      - data:
          name: End Of Day
          message: Timer DONE → shut-down sequence executed.
        action: logbook.log
  mode: single
  variables:
    ed_home: '{{ is_state(''person.edward_steele'',''home'') }}'
    janet_in_bed: '{{ is_state(''binary_sensor.bed_occupancy_sensor_2_bed_occupied_right'',''on'')
      }}'
    both_in_bed: '{{ is_state(''binary_sensor.both_in_bed_2'',''on'') }}'
    bedtime_ok: '{{ (ed_home and both_in_bed) or ((not ed_home) and janet_in_bed)
      }}'
