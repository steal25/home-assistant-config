  - entity_id:
    - binary_sensor.group_garage_radio_motion_sensor
    id: Motion Detected
    from:
    - 'off'
    to:
    - 'on'
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 3
  conditions:
  - condition: state
    entity_id: person.edward_steele
    state: home
  - condition: time
    after: 07:00:00
    before: '23:00:00'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Motion Stopped
      sequence:
      - action: timer.start
        target:
          entity_id:
          - timer.timer_garage_radio
        data: {}
    - conditions:
      - condition: trigger
        id:
        - Motion Detected
      sequence:
      - action: timer.cancel
        target:
          entity_id:
          - timer.timer_garage_radio
        data: {}
      - if:
        - condition: time
          after: 07:00:00
          before: '23:59:00'
          weekday:
          - sat
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
        - condition: state
          entity_id: person.edward_steele
          state: home
        then:
