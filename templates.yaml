########BASELINE HUMIDITY TEMPLATE#######

  - sensor:
      # Rolling baseline humidity, for debugging/graphing
      - name: "Bathroom Humidity Baseline"
        unique_id: bathroom_humidity_baseline
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: >-
          {% set mean = state_attr('sensor.bathroom_humidity_baseline_stats', 'mean') %}
          {% if mean is number %}
            {{ mean | round(1) }}
          {% else %}
            {{ states('sensor.bathroom_humidity_bathroom_humidity_sht45') }}
          {% endif %}

      # Humidity above/below the rolling baseline
      - name: "Bathroom Humidity Above Baseline"
        unique_id: bathroom_humidity_above_baseline
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: >-
          {% set cur = states('sensor.bathroom_humidity_bathroom_humidity_sht45') | float(0) %}
          {% set mean = state_attr('sensor.bathroom_humidity_baseline_stats', 'mean') %}
          {% if mean is number %}
            {{ (cur - (mean | float(0))) | round(2) }}
          {% else %}
            0
          {% endif %}

  ####### SMART PRESENCE SENSORS #########

  - binary_sensor:
      - name: "Bathroom Presence Final"
        unique_id: bathroom_presence_final
        device_class: presence
        state: >-
          {{ is_state('binary_sensor.bathroom_motion_sensors', 'on') }}
        # Small debounce on
        delay_on: "00:00:00.2"
        # Extra grace period so lights don't drop as soon as mmWave flickers off
        delay_off: "00:00:30"
 
 
 ######## GARAGE DOOR  ##########       
        
  - cover:
      - unique_id: garage_door_template
        name: "Garage Door"
        device_class: garage

        icon: >
          {% if is_state('binary_sensor.garage_door_open_close_sensor', 'on') %}
            mdi:garage-open-variant
          {% else %}
            mdi:garage-variant
          {% endif %}

        state: >
          {% if is_state('binary_sensor.garage_door_open_close_sensor', 'on') %}
            open
          {% else %}
            closed
          {% endif %}

        open_cover:
          - condition: template
            value_template: >
              {{ not is_state('binary_sensor.garage_door_open_close_sensor', 'on') }}
          - service: switch.turn_on
            target:
              entity_id: switch.garage_door_zooz
          - condition: template
            value_template: >
              {{ is_state('binary_sensor.garage_door_open_close_sensor', 'on') }}
          - service: media_player.play_media
            target:
              entity_id: media_player.all_echos
            data:
              media_content_type: tts
              media_content_id: "The garage door is already closed."

        close_cover:
          - condition: template
            value_template: >
              {{ is_state('binary_sensor.garage_door_open_close_sensor', 'on') }}
          - service: switch.turn_on
            target:
              entity_id: switch.garage_door_zooz
          - condition: template
            value_template: >
              {{ not is_state('binary_sensor.garage_door_open_close_sensor', 'on') }}
          - service: media_player.play_media
            target:
              entity_id: media_player.echo_dot_office
            data:
              media_content_type: tts
              media_content_id: "The garage door is already open."

        stop_cover:
          - service: switch.turn_on
            target:
              entity_id: switch.garage_door_zooz
              
              
