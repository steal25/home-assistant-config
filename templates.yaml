##### HOLIDAYS ####

  - binary_sensor:
      - name: holiday_new_years_window
        unique_id: holiday_new_years_window
        state: >
          {% set t = now().date() %}
          {% set h = t.replace(month=1, day=1) %}
          {{ (h - timedelta(days=5)) <= t <= (h + timedelta(days=5)) }}

      - name: holiday_valentines_window
        unique_id: holiday_valentines_window
        state: >
          {% set t = now().date() %}
          {% set h = t.replace(month=2, day=14) %}
          {{ (h - timedelta(days=5)) <= t <= (h + timedelta(days=5)) }}

      - name: holiday_easter_window
        unique_id: holiday_easter_window
        state: >
          {# Computus (Gregorian) #}
          {% set y = now().year %}
          {% set a = y % 19 %}
          {% set b = y // 100 %}
          {% set c = y % 100 %}
          {% set d = b // 4 %}
          {% set e = b % 4 %}
          {% set f = (b + 8) // 25 %}
          {% set g = (b - f + 1) // 3 %}
          {% set h = (19*a + b - d - g + 15) % 30 %}
          {% set i = c // 4 %}
          {% set k = c % 4 %}
          {% set l = (32 + 2*e + 2*i - h - k) % 7 %}
          {% set m = (a + 11*h + 22*l) // 451 %}
          {% set month = (h + l - 7*m + 114) // 31 %}
          {% set day = ((h + l - 7*m + 114) % 31) + 1 %}
          {% set t = now().date() %}
          {% set easter = t.replace(month=month, day=day) %}
          {{ (easter - timedelta(days=5)) <= t <= (easter + timedelta(days=5)) }}

      - name: holiday_mothers_day_window   # 2nd Sunday in May ±3d
        unique_id: holiday_mothers_day_window
        state: >
          {% set y = now().year %}
          {% set may1 = strptime(y ~ '-05-01', '%Y-%m-%d').date() %}
          {% set first_sun = may1 + timedelta(days=(6 - may1.weekday()) % 7) %}
          {% set mothers = first_sun + timedelta(days=7) %}
          {% set t = now().date() %}
          {{ (mothers - timedelta(days=3)) <= t <= (mothers + timedelta(days=3)) }}

      - name: holiday_fathers_day_window   # 3rd Sunday in June ±3d
        unique_id: holiday_fathers_day_window
        state: >
          {% set y = now().year %}
          {% set jun1 = strptime(y ~ '-06-01', '%Y-%m-%d').date() %}
          {% set first_sun = jun1 + timedelta(days=(6 - jun1.weekday()) % 7) %}
          {% set fathers = first_sun + timedelta(days=14) %}
          {% set t = now().date() %}
          {{ (fathers - timedelta(days=3)) <= t <= (fathers + timedelta(days=3)) }}

      - name: holiday_juneteenth_window    # June 19 ±1d (your 18–20)
        unique_id: holiday_juneteenth_window
        state: >
          {% set t = now().date() %}
          {% set h = t.replace(month=6, day=19) %}
          {{ (h - timedelta(days=1)) <= t <= (h + timedelta(days=1)) }}

      - name: holiday_july4_window
        unique_id: holiday_july4_window
        state: >
          {% set t = now().date() %}
          {% set h = t.replace(month=7, day=4) %}
          {{ (h - timedelta(days=5)) <= t <= (h + timedelta(days=5)) }}
          
      - name: holiday_stpat_window
        unique_id: holiday_stpat_window
        state: >
          {% set t = now().date() %}
          {% set h = t.replace(month=3, day=17) %}
          {{ (h - timedelta(days=5)) <= t <= (h + timedelta(days=2)) }}          

      - name: holiday_halloween_window
        unique_id: holiday_halloween_window
        state: >
          {% set t = now().date() %}
          {% set start = t.replace(month=10, day=25) %}
          {% set end   = t.replace(month=11, day=5) %}
          {{ start <= t <= end }}

      - name: holiday_thanksgiving_window  # 4th Thursday in Nov ±5d
        unique_id: holiday_thanksgiving_window
        state: >
          {% set t = now().date() %}
          {% set y = t.year %}
          {% set nov1 = strptime(y ~ '-11-01', '%Y-%m-%d').date() %}
          {% set first_thu = nov1 + timedelta(days=(3 - nov1.weekday()) % 7) %}
          {% set tg = first_thu + timedelta(days=21) %}
          {{ (tg - timedelta(days=5)) <= t <= (tg + timedelta(days=5)) }}

      - name: holiday_christmas_window
        unique_id: holiday_christmas_window
        state: >
          {% set t = now().date() %}
          {% set start = t.replace(month=12, day=5) %}
          {% set end   = t.replace(month=12, day=30) %}
          {{ start <= t <= end }}

      # Seasons (fixed ranges; winter wraps new year)
      - name: season_fall_window
        unique_id: season_fall_window
        state: >
          {% set t = now().date() %}
          {% set start = t.replace(month=9,  day=21) %}
          {% set end   = t.replace(month=12, day=21) %}
          {{ start <= t <= end }}

      - name: season_winter_window
        unique_id: season_winter_window
        state: >
          {% set t = now().date() %}
          {% set y = t.year %}
          {% set start = strptime(y ~ '-12-22', '%Y-%m-%d').date() %}
          {% set end   = strptime((y+1) ~ '-03-20', '%Y-%m-%d').date() %}
          {% if t.month >= 12 %}
            {{ start <= t <= end }}
          {% else %}
            {{ strptime((y-1) ~ '-12-22', '%Y-%m-%d').date() <= t <= strptime(y ~ '-03-20', '%Y-%m-%d').date() }}
          {% endif %}

      - name: season_spring_window
        unique_id: season_spring_window
        state: >
          {% set t = now().date() %}
          {% set start = t.replace(month=3, day=21) %}
          {% set end   = t.replace(month=6, day=21) %}
          {{ start <= t <= end }}

      - name: season_summer_window
        unique_id: season_summer_window
        state: >
          {% set t = now().date() %}
          {% set start = t.replace(month=6, day=22) %}
          {% set end   = t.replace(month=9, day=20) %}
          {{ start <= t <= end }}
          
          
          
#template:
  - binary_sensor:
      # Use THIS entity in automations/groups instead of the raw ZSE11 motion
      - name: "Garage PIR Reliable"
        unique_id: garage_pir_reliable
        device_class: motion
        state: >
          {% set s = states.binary_sensor.q_sensor_motion_detection %}
          {% set on = s is not none and s.state == 'on' %}
          {% set age = (as_timestamp(now()) - as_timestamp(s.last_changed))
                        if s is not none and s.last_changed else 0 %}
          {% set max = states('input_number.pir_stuck_timeout') | int(600) %}
          {{ on and age < max }}
        attributes:
          original_state: "{{ states('binary_sensor.q_sensor_motion_detection') }}"
          seconds_since_change: >
            {% set s = states.binary_sensor.q_sensor_motion_detection %}
            {{ (as_timestamp(now()) - as_timestamp(s.last_changed)) | int(0)
               if s is not none and s.last_changed else 0 }}

      # Optional: a “problem” sensor to tell you when it appears stuck
      - name: "Garage PIR Stuck"
        unique_id: garage_pir_stuck
        device_class: problem
        state: >
          {% set s = states.binary_sensor.q_sensor_motion_detection %}
          {% set on = s is not none and s.state == 'on' %}
          {% set age = (as_timestamp(now()) - as_timestamp(s.last_changed))
                        if s is not none and s.last_changed else 0 %}
          {% set max = states('input_number.pir_stuck_timeout') | int(600) %}
          {{ on and age >= max }}
        attributes:
          seconds_since_change: >
            {% set s = states.binary_sensor.q_sensor_motion_detection %}
            {{ (as_timestamp(now()) - as_timestamp(s.last_changed)) | int(0)
               if s is not none and s.last_changed else 0 }}
          timeout_seconds: "{{ states('input_number.pir_stuck_timeout') | int(600) }}"
                    
         

