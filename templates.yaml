            'media_player.echo_dot_garage_bathroom'
            'media_player.echo_dot_max_living_room_left'
            'media_player.echo_dot_max_master_bedroom'
          ] %}
          {% for e in echos %}
            {% if state_attr(e, 'last_called') %}
              {{ e }}
              {% break %}
            {% endif %}
          {% endfor %}
          
          
