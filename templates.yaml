  - sensor:
      - name: "Water Meter Gallons"
        unit_of_measurement: "gal"
        state: "{{ states('sensor.yolink_water_meter_water_meter_reading') | float * 7.48052 }}"
        device_class: water
        state_class: total_increasing     
        
        
         
##########BLE###########

  - sensor:
      # ---------- Eddie ----------
      - name: "big_eddie_ble_nearest_source_mac"
        icon: mdi:access-point
        state: >
          {% set s = states.device_tracker.big_eddie_ble %}
          {% if s is none or s.state != 'home' %}
            unknown
          {% else %}
            {% set src = s.attributes.source | default('unknown') %}
            {{ src if src is not none else 'unknown' }}
          {% endif %}

      - name: "big_eddie_room"
        icon: mdi:home-map-marker
        state: >
          {% set person_state = states('person.edward_steele') %}
          {% set mac = states('sensor.big_eddie_ble_nearest_source_mac') %}
          {% set map = {
            '98:3D:AE:AB:1A:CA': 'Garage Bathroom',
            '58:8C:81:A1:D7:EA': 'Garage Bathroom',
            'E4:B3:23:C5:77:12': 'Garage',
            'E4:B3:23:C5:5E:66': 'Garage',
            '80:F3:DA:8F:26:7C': 'House Bathroom',
            '28:56:2F:5D:1F:CE': 'House Bathroom',
            'F0:9E:9E:B5:94:26': 'Office',
            '64:E8:33:86:57:76': 'Living Room',
            'EC:E3:34:78:70:9A': 'Living Room',
            '64:E8:33:84:A1:72': 'Master',
            'EC:64:C9:86:28:46': 'Master',
            'FC:B3:BC:59:49:98': 'Master',
            'B0:81:84:2B:D8:6E': 'Master'
          } %}

          {% if person_state == 'not_home' %}
            Away
          {% else %}
            {% if mac in map %}
              {{ map[mac] }}
            {% else %}
              Home (no BLE)
            {% endif %}
          {% endif %}

