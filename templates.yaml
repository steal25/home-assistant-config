  - binary_sensor:
      - name: "Couch Anyone Present (Frigate Delayed)"
        unique_id: couch_anyone_present_frigate_delayed
        device_class: occupancy
        state: >
          {{ is_state('binary_sensor.couch_anyone_present_frigate', 'on') }}
        delay_off: "00:00:15"


############ COUCH TEMPLATE SENSOR GROUPS ############


  - binary_sensor:
      # ----------------------------
      # Eddie zone
